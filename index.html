  }

  // 添付ファイル
  const attBox = $("#tm-atts");
  for (const a of (t.attachments || [])) {
    const item = document.createElement("div");
    item.className = "att-item";
    item.setAttribute("data-testid", "att-item");
    const isImg = (a.type || "").startsWith("image/");
    item.innerHTML = `${isImg ? `<img class="att-thumb" alt="${esc(a.name)}">` : `<span style="font-size:22px">📄</span>`}
      <a href="#" class="att-name">${esc(a.name)}</a>
      <span class="att-size">${a.size >= 1048576 ? (a.size / 1048576).toFixed(1) + "MB" : Math.max(1, Math.round(a.size / 1024)) + "KB"}</span>
      <button class="btn small danger" data-testid="att-del" title="添付を削除">✕</button>`;
    if (isImg) fileGet(a.id).then(b => {
      const img = item.querySelector("img");
      if (b && img) img.src = URL.createObjectURL(b);
    }).catch(() => {});
    const openOrDl = async e => {
      e.preventDefault();
      const b = await fileGet(a.id);
      if (!b) { toast("ファイルの実体が見つかりません", "error"); return; }
      const u = URL.createObjectURL(b);
      if (isImg) {
        modalShell(`<img src="${u}" alt="${esc(a.name)}" style="max-width:100%;max-height:75vh;display:block;margin:0 auto;border-radius:6px">
          <div class="modal-foot"><a class="btn" href="${u}" download="${esc(a.name)}">⬇ 保存</a><span class="spacer"></span><button class="btn" onclick="closeModal()">閉じる</button></div>`);
      } else {
        const dl = document.createElement("a");
        dl.href = u; dl.download = a.name; dl.click();
      }
    };
    item.querySelector(".att-name").onclick = openOrDl;
    const th = item.querySelector(".att-thumb");
    if (th) th.onclick = openOrDl;
    item.querySelector("[data-testid=att-del]").onclick = () => {
      fileDelete(a.id).catch(() => {});
      apply(() => { t.attachments = (t.attachments || []).filter(x => x.id !== a.id); });
    };
    attBox.appendChild(item);
  }
  $("[data-testid=tm-att-btn]").onclick = () => $("#tm-att-file").click();
  $("#tm-att-file").onchange = e => {
    const files = [...e.target.files];
    e.target.value = "";
    attachFiles(t, files);
  };

  // 詳細設定の開閉（⋯ボタン / 要約チップのクリック）
  $("[data-testid=tm-more]").onclick = () => { detailExpanded = !detailExpanded; renderDetailPanel(); };
  const summary = $("[data-testid=tm-summary]");
  if (summary) summary.onclick = () => { detailExpanded = true; renderDetailPanel(); };

  // ---- 以下は詳細設定（展開時のみDOMに存在） ----
  if (detailExpanded) {
  $("#tm-project").onchange = e => {
    // サブタスクは常に親タスクの直下に表示されるため（一覧は親子関係の木構造で描画され、
    // 子タスク自身のprojectId/sectionIdは表示位置に反映されない）、サブタスクのプロジェクトを
    // 明示的に変更した場合は親から独立させる（そうしないと変更しても見た目が一切変わらない）
    const wasSub = !!t.parentTaskId;
    apply(() => {
      t.projectId = e.target.value || null;
      t.sectionId = null;
      if (wasSub) t.parentTaskId = null;
      cascadeProject(t.id, t.projectId); // 自身の子孫にも引き継ぐ
    });
    if (wasSub) toast(`「${t.title}」を独立したタスクとして移動しました`);
  };
  $("#tm-section").onchange = e => {
    const wasSub = !!t.parentTaskId;
    apply(() => {
      t.sectionId = e.target.value || null;
      if (wasSub) t.parentTaskId = null;
    });
    if (wasSub) toast(`「${t.title}」を独立したタスクとして移動しました`);
  };
  // 日付系: iOSはカレンダー操作中にもchangeが発火する。ここでパネルを再描画すると
  // 入力欄ごと作り直されてカレンダーが閉じてしまうため、「即保存＋メイン画面のみ更新」とし、
  // パネルの再描画はフォーカスが外れてから行う
  const liteApply = fn => { fn(); touch(t); save(); renderMain(); };
  const refreshOnBlur = el => el.addEventListener("blur", () => {
    setTimeout(() => { if (detailTaskId === t.id && !panel.contains(document.activeElement)) renderDetailPanel(); }, 100);
  });
  // 開始日/終了日/開始可能日/納期はコンパクト表示中（値ありでeditingDateFieldと不一致）だとinputが存在しないため、
  // 存在チェックしてから紐づける（存在しないままonchange=を代入すると例外で以降の紐づけ処理全体が止まってしまう）
  const tmStart = $("#tm-start");
  if (tmStart) tmStart.onchange = e => {
    const v = e.target.value || null;
    liteApply(() => {
      t.startDate = v;
      if (v && t.endDate && t.endDate < v) t.endDate = v; // 期間の前後を自動補正
    });
    if (v) {
      const conflict = (t.blockedBy || []).map(getTask).filter(p => p && !p.deletedAt && p.status !== "completed" && p.endDate && p.endDate > v);
      if (conflict.length) toast(`⚠ 開始日が先行タスク「${conflict[0].title}」の終了日より前です`, "warn");
    }
  };
  const tmEnd = $("#tm-end");
  if (tmEnd) tmEnd.onchange = e => {
    const v = e.target.value || null;
    liteApply(() => {
      t.endDate = v;
      if (v && !t.startDate) t.startDate = v; // 開始日が未入力なら終了日と同じ値を自動設定
      else if (v && t.startDate && v < t.startDate) t.startDate = v;
    });
  };
  $("#tm-end-time").onchange = e => liteApply(() => { t.endTime = e.target.value || null; }); // 時刻欄は常にinput
  const tmDue = $("#tm-due");
  if (tmDue) tmDue.onchange = e => liteApply(() => { t.dueDate = e.target.value || null; });
  const tmEsd = $("#tm-esd");
  if (tmEsd) tmEsd.onchange = e => liteApply(() => { t.earliestStartDate = e.target.value || null; });
  for (const id of ["tm-start", "tm-end", "tm-end-time", "tm-due", "tm-esd"]) {
    const el = $("#" + id);
    if (el) refreshOnBlur(el); // コンパクト表示中（<input>が存在しない）はスキップ
  }
  // 日付のコンパクト表示（年を省いたM/D）→クリックでネイティブ日付ピッカー（年も編集可）に切り替える
  panel.querySelectorAll(".date-compact-btn").forEach(btn => {
    btn.onclick = () => {
      editingDateField = btn.dataset.dateKey;
      renderDetailPanel();
      const input = $("#tm-" + editingDateField);
      if (input) {
        input.focus();
        if (input.showPicker) { try { input.showPicker(); } catch { /* 未対応ブラウザは無視 */ } }
      }
    };
  });
  // 日付クリアボタン: iOSのネイティブ日付ピッカーには一度設定した値を空に戻す手段がないため、
  // 明示的なクリアボタンで対応する（ボタン操作なのでフルre-renderのapplyで即時反映してよい）
  $("[data-testid=tm-start-clear]").onclick = () => apply(() => { t.startDate = null; });
  $("[data-testid=tm-end-clear]").onclick = () => apply(() => { t.endDate = null; t.endTime = null; });
  $("[data-testid=tm-esd-clear]").onclick = () => apply(() => { t.earliestStartDate = null; });
  $("[data-testid=tm-due-clear]").onclick = () => apply(() => { t.dueDate = null; });
  $("#tm-progress").oninput = () => { $("#tm-prog-val").textContent = $("#tm-progress").value + "%"; };
  $("#tm-progress").onchange = e => apply(() => { t.progress = Number(e.target.value); });
  $("#tm-milestone").onchange = e => apply(() => { t.isMilestone = e.target.checked; });
  $("#tm-tags").onchange = e => apply(() => {
    t.tags = e.target.value.split(",").map(s => s.trim()).filter(Boolean);
  });

  // 依存タスク: 追加・削除とも即保存
  panel.querySelectorAll(".dep-chip [data-testid=dep-remove]").forEach(b => {
    b.onclick = () => {
      const id = b.closest(".dep-chip").dataset.dep;
      apply(() => { t.blockedBy = (t.blockedBy || []).filter(x => x !== id); });
    };
  });
  {
    const searchEl = $("#tm-dep-add");
    const listEl = $("#tm-dep-add-list");
    const renderOptions = () => {
      const q = searchEl.value.trim().toLowerCase();
      const matches = (q ? depCandidates.filter(x => x.title.toLowerCase().includes(q) || shortId(x.id).includes(q)) : depCandidates).slice(0, 30);
      if (!matches.length) {
        listEl.innerHTML = `<div class="dep-search-empty">該当するタスクがありません</div>`;
      } else {
        listEl.innerHTML = matches.map(x => `<div class="dep-search-item" data-id="${x.id}"><span>${esc(x.title)}${x.projectId ? `<span class="dep-search-proj"> ・ ${esc(getProject(x.projectId)?.name || "")}</span>` : ""}</span><span class="task-id-badge">#${shortId(x.id)}</span></div>`).join("");
        listEl.querySelectorAll("[data-id]").forEach(el => {
          el.onclick = () => {
            const id = el.dataset.id;
            if (wouldCycle(t.id, id)) { toast("循環依存になるため追加できません", "error"); return; }
            apply(() => { t.blockedBy = [...(t.blockedBy || []), id]; });
          };
        });
      }
      listEl.style.display = "block";
    };
    searchEl.addEventListener("focus", renderOptions);
    searchEl.addEventListener("input", renderOptions);
    searchEl.addEventListener("blur", () => setTimeout(() => { listEl.style.display = "none"; }, 150));
  }

  // 次回アクション・ステータス: 各欄のどれかが変わったらまとめて保存
  const naSave = () => {
    const what = $("#tm-na-what").value.trim();
    const status = $("#tm-na-status").value.trim();
    apply(() => {
      t.nextAction = (what || status) ? { what, status: status || null } : null;
    });
  };
  for (const id of ["tm-na-what", "tm-na-status"]) {
    $("#" + id).onchange = naSave;
  }
  $("#tm-na-waiting").onchange = () => toggleDelegated(t.id);

  // 繰り返し設定
  const repeatSave = () => {
    const unit = $("#tm-repeat-unit").value;
    if (!unit) { apply(() => { t.repeat = null; }); return; }
    const interval = Math.max(1, parseInt($("#tm-repeat-interval").value, 10) || 1);
    const from = $("#tm-repeat-from").value === "completion" ? "completion" : "due";
    const until = $("#tm-repeat-until").value || null;
    const byDay = unit === "week"
      ? [...panel.querySelectorAll("#tm-repeat-days input:checked")].map(cb => Number(cb.value)).sort((a, b) => a - b)
      : undefined;
    apply(() => { t.repeat = { unit, interval, from, ...(until ? { until } : {}), ...(byDay && byDay.length ? { byDay } : {}) }; });
  };
  $("#tm-repeat-unit").onchange = () => {
    const daysBox = panel.querySelector("#tm-repeat-days");
    if (daysBox) daysBox.style.display = $("#tm-repeat-unit").value === "week" ? "flex" : "none";
    repeatSave();
  };
  $("#tm-repeat-interval").onchange = repeatSave;
  $("#tm-repeat-until").onchange = repeatSave;
  $("#tm-repeat-from").onchange = repeatSave;
  panel.querySelectorAll("#tm-repeat-days input").forEach(cb => { cb.onchange = repeatSave; });
  } // detailExpanded

  // サブタスク
  panel.querySelectorAll(".subtask-line").forEach(line => {
    const sid = line.dataset.sub;
    line.querySelector("[data-testid=sub-check]").onclick = () => toggleComplete(sid);
    line.querySelector("[data-testid=sub-title]").onclick = () => openTaskModal(sid);
  });
  $("#tm-sub-new").onkeydown = e => {
    if (e.key !== "Enter" || isIMEEnter(e)) return;
    e.preventDefault();
    const v = e.target.value.trim();
    if (!v) return;
    newTask({ title: v, parentTaskId: t.id, projectId: t.projectId, sectionId: t.sectionId });
    commit();
    panel.querySelector("#tm-sub-new")?.focus(); // 連続入力できるようフォーカス復帰
  };
}

/* ---- プロジェクト作成・編集モーダル ---- */
function openProjectModal(projId) {
  const p = projId ? getProject(projId) : null;
  const color = p ? p.color : PROJ_COLORS[state.projects.length % PROJ_COLORS.length];
  const m = modalShell(`
    <h2>${p ? "プロジェクト編集" : "新しいプロジェクト"}</h2>
    <div class="f-row"><div class="f-col">
      <label>プロジェクト名</label>
      <input id="pm-name" data-testid="pm-name" value="${esc(p ? p.name : "")}" placeholder="例: Webサイトリニューアル">
    </div></div>
    <div class="f-row"><div class="f-col">
      <label>カラー</label>
      <div style="display:flex;gap:8px;flex-wrap:wrap">${PROJ_COLORS.map(c =>
        `<button class="color-pick" data-color="${c}" style="width:26px;height:26px;border-radius:6px;background:${c};border:2px solid ${c === color ? "#fff" : "transparent"};cursor:pointer"></button>`).join("")}</div>
    </div></div>
    <div class="modal-foot">
      ${p ? `<button class="btn danger" data-testid="pm-delete">削除</button>` : ""}
      <span class="spacer"></span>
      <button class="btn" data-testid="pm-cancel">キャンセル</button>
      <button class="btn primary" data-testid="pm-save">${p ? "保存" : "作成"}</button>
    </div>`);
  let picked = color;
  m.querySelectorAll(".color-pick").forEach(b => {
    b.onclick = () => {
      picked = b.dataset.color;
      m.querySelectorAll(".color-pick").forEach(x => x.style.borderColor = "transparent");
      b.style.borderColor = "#fff";
    };
  });
  const input = m.querySelector("#pm-name");
  input.focus();
  const doSave = () => {
    const name = input.value.trim();
    if (!name) { toast("プロジェクト名を入力してください", "warn"); return; }
    if (p) { p.name = name; p.color = picked; p.updatedAt = nowISO(); }
    else {
      const np = { id: uid(), name, color: picked, icon: "", status: "active", sortOrder: state.projects.length, showCompleted: true, createdAt: nowISO(), updatedAt: nowISO() };
      state.projects.push(np);
      view = { type: "project", id: np.id };
    }
    closeModal();
    commit();
  };
  m.querySelector("[data-testid=pm-save]").onclick = doSave;
  input.onkeydown = e => { if (e.key === "Enter" && !isIMEEnter(e)) doSave(); };
  m.querySelector("[data-testid=pm-cancel]").onclick = closeModal;
  if (p) m.querySelector("[data-testid=pm-delete]").onclick = () => {
    if (!confirm(`プロジェクト「${p.name}」を削除しますか？（中のタスクはゴミ箱へ）`)) return;
    for (const t of state.tasks.filter(t => t.projectId === p.id && !t.deletedAt)) { t.deletedAt = nowISO(); touch(t); }
    state.sections = state.sections.filter(s => s.projectId !== p.id);
    // 配列からハード削除すると、updatedAtのタイムスタンプが無いため同期のmergeByIdが
    // 「削除」を検知できず、他端末や次回pull時に復活してしまう。他のエンティティ同様、
    // status:"deleted"のタグ付け（ソフト削除）にしてupdatedAtを更新することで、
    // 通常のmergeByIdの「新しい方が勝つ」ロジックがそのまま削除の伝播にも機能するようにする。
    p.status = "deleted";
    p.updatedAt = nowISO();
    closeModal();
    view = { type: "today" };
    commit();
  };
}

/*========================================================
  一括編集（複数選択したタスクへまとめて反映）
========================================================*/
function openBulkEditModal() {
  const ids = [...selectedTaskIds];
  const tasks = ids.map(getTask).filter(Boolean);
  if (!tasks.length) return;
  // 詳細パネルが開いたままだとモーダルと重なって紛らわしい（フィールドが読みにくく操作できないように見える）ため、先に閉じる
  if (detailTaskId) { detailTaskId = null; renderDetailPanel(); }
  const projOpts = `<option value="">（Inbox）</option>` + visibleProjects().sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0))
    .map(p => `<option value="${p.id}">${esc(p.name)}</option>`).join("");
  // 依存タスクの候補: 選択中のタスク同士は対象外（自己参照・循環の温床になりやすいため）
  const depCandidates = liveTasks().filter(x => !ids.includes(x.id));

  const m = modalShell(`
    <h2>一括編集（${tasks.length}件選択中）</h2>
    <p style="font-size:12px;color:var(--text-dim);margin-bottom:10px">チェックを入れた項目だけが、選択中の全タスクへまとめて反映されます。</p>

    <div class="bulk-field" data-field="project">
      <label><input type="checkbox" data-testid="bulk-project-on"> プロジェクト</label>
      <div class="bulk-inputs"><select data-testid="bulk-project">${projOpts}</select></div>
    </div>
    <div class="bulk-field" data-field="section">
      <label><input type="checkbox" data-testid="bulk-section-on"> セクション</label>
      <div class="bulk-inputs">
        <select data-testid="bulk-section"><option value="">（なし）</option></select>
        <span style="font-size:11px;color:var(--text-faint)">※プロジェクトも同時に適用する場合のみ有効</span>
      </div>
    </div>
    <div class="bulk-field" data-field="start">
      <label><input type="checkbox" data-testid="bulk-start-on"> 開始日</label>
      <div class="bulk-inputs"><input type="date" data-testid="bulk-start"></div>
    </div>
    <div class="bulk-field" data-field="end">
      <label><input type="checkbox" data-testid="bulk-end-on"> 終了日・時刻</label>
      <div class="bulk-inputs">
        <input type="date" data-testid="bulk-end" style="flex:1.4">
        <input type="time" data-testid="bulk-end-time" step="600" style="flex:1">
      </div>
    </div>
    <div class="bulk-field" data-field="esd">
      <label><input type="checkbox" data-testid="bulk-esd-on"> 開始可能日</label>
      <div class="bulk-inputs"><input type="date" data-testid="bulk-esd"></div>
    </div>
    <div class="bulk-field" data-field="due">
      <label><input type="checkbox" data-testid="bulk-due-on"> 納期</label>
      <div class="bulk-inputs">
        <input type="date" data-testid="bulk-due" style="flex:1.4">
      </div>
    </div>
    <div class="bulk-field" data-field="progress">
      <label><input type="checkbox" data-testid="bulk-progress-on"> 進捗</label>
      <div class="bulk-inputs">
        <input type="range" min="0" max="100" step="5" value="0" data-testid="bulk-progress" style="flex:1">
        <span data-testid="bulk-progress-val" style="width:38px;text-align:right;font-size:12px;color:var(--text-dim)">0%</span>
      </div>
    </div>
    <div class="bulk-field" data-field="deps">
      <label><input type="checkbox" data-testid="bulk-deps-on"> 依存タスク（追加）</label>
      <div class="bulk-inputs" style="flex-direction:column;align-items:stretch">
        <input data-testid="bulk-deps-search" data-no-autocheck placeholder="タスク名で検索..." autocomplete="off">
        <select multiple size="4" data-testid="bulk-deps" style="width:100%;margin-top:4px">
          ${depCandidates.map(x => `<option value="${x.id}">${esc(x.title)}${x.projectId ? "（" + esc(getProject(x.projectId)?.name || "") + "）" : ""} #${shortId(x.id)}</option>`).join("")}
        </select>
      </div>
    </div>
    <div class="bulk-field" data-field="na">
      <label><input type="checkbox" data-testid="bulk-na-on"> 次回アクション・ステータス</label>
      <div class="bulk-inputs" style="flex-direction:column;align-items:stretch">
        <input data-testid="bulk-na-what" placeholder="何をするか">
        <input data-testid="bulk-na-status" placeholder="ステータス（自由記述）" style="margin-top:4px">
      </div>
    </div>
    <div class="bulk-field" data-field="tags">
      <label><input type="checkbox" data-testid="bulk-tags-on"> タグ</label>
      <div class="bulk-inputs"><input data-testid="bulk-tags" placeholder="カンマ区切り（既存タグを置き換えます）" style="width:100%"></div>
    </div>
    <div class="bulk-field" data-field="repeat">
      <label><input type="checkbox" data-testid="bulk-repeat-on"> 繰り返し</label>
      <div class="bulk-inputs" style="flex-direction:column;align-items:stretch">
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <select data-testid="bulk-repeat-unit">
            <option value="">なし</option>
            ${["day", "week", "month", "year"].map(u => `<option value="${u}">${{ day: "日", week: "週", month: "ヶ月", year: "年" }[u]}ごと</option>`).join("")}
          </select>
          <input type="number" min="1" value="1" data-testid="bulk-repeat-interval" style="width:56px">
          <select data-testid="bulk-repeat-from">
            <option value="due">期日基準</option>
            <option value="completion">完了日基準</option>
          </select>
        </div>
        <div data-testid="bulk-repeat-days" style="display:none;gap:8px;margin-top:6px;flex-wrap:wrap">
          ${WEEKDAYS_SHORT.map((w, i) => `<label style="font-size:11px;display:flex;gap:3px;align-items:center"><input type="checkbox" value="${i}">${w}</label>`).join("")}
        </div>
        <div style="display:flex;align-items:center;gap:6px;margin-top:6px">
          <label style="font-size:11px;color:var(--text-dim);white-space:nowrap">終了日（任意）</label>
          <input type="date" data-testid="bulk-repeat-until" style="flex:1">
        </div>
      </div>
    </div>

    <div class="modal-foot">
      <button class="btn" data-testid="bulk-cancel">キャンセル</button>
      <span class="spacer"></span>
      <button class="btn primary" data-testid="bulk-apply">${tasks.length}件に適用</button>
    </div>`);

  const $ = sel => m.querySelector(sel);
  // チェックのon/offで各項目の入力欄を有効/無効に切り替え
  m.querySelectorAll(".bulk-field").forEach(fieldEl => {
    const cb = fieldEl.querySelector("input[type=checkbox]");
    const sync = () => fieldEl.classList.toggle("off", !cb.checked);
    sync();
    cb.onchange = sync;
    // 値を入力・選択したのにチェック入れ忘れて「何も反映されない」を防ぐため、自動で有効チェックを入れる
    fieldEl.querySelectorAll("input, select, textarea").forEach(el => {
      if (el === cb || el.dataset.noAutocheck !== undefined) return;
      const autoCheck = () => { if (!cb.checked) { cb.checked = true; sync(); } };
      el.addEventListener("input", autoCheck);
      el.addEventListener("change", autoCheck);
    });
  });
  // プロジェクト変更でセクションの選択肢を更新
  $("[data-testid=bulk-project]").onchange = () => {
    const pid = $("[data-testid=bulk-project]").value || null;
    $("[data-testid=bulk-section]").innerHTML = `<option value="">（なし）</option>` +
      state.sections.filter(s => s.projectId === pid).map(s => `<option value="${s.id}">${esc(s.name)}</option>`).join("");
  };
  $("[data-testid=bulk-progress]").oninput = () => {
    $("[data-testid=bulk-progress-val]").textContent = $("[data-testid=bulk-progress]").value + "%";
  };
  // 依存タスク候補をタスク名で絞り込み（選択済みoptionはDOMに残したままdisplay:noneで隠すため選択状態は保持される）
  $("[data-testid=bulk-deps-search]").oninput = e => {
    const q = e.target.value.trim().toLowerCase();
    $("[data-testid=bulk-deps]").querySelectorAll("option").forEach(opt => {
      opt.style.display = !q || opt.textContent.toLowerCase().includes(q) ? "" : "none";
    });
  };
  $("[data-testid=bulk-repeat-unit]").onchange = () => {
    $("[data-testid=bulk-repeat-days]").style.display = $("[data-testid=bulk-repeat-unit]").value === "week" ? "flex" : "none";
  };

  $("[data-testid=bulk-cancel]").onclick = closeModal;
  $("[data-testid=bulk-apply]").onclick = () => {
    const on = name => $(`[data-testid=bulk-${name}-on]`).checked;
    let touched = 0, skippedDeps = 0;

    for (const t of tasks) {
      let changed = false;
      if (on("project")) {
        t.projectId = $("[data-testid=bulk-project]").value || null;
        t.sectionId = null;
        if (t.parentTaskId) t.parentTaskId = null; // サブタスクは親子木構造で表示位置が決まるため、プロジェクト変更時は親から独立させる
        cascadeProject(t.id, t.projectId);
        changed = true;
      }
      if (on("section") && on("project")) {
        t.sectionId = $("[data-testid=bulk-section]").value || null;
        changed = true;
      }
      if (on("start")) { t.startDate = $("[data-testid=bulk-start]").value || null; changed = true; }
      if (on("end")) {
        t.endDate = $("[data-testid=bulk-end]").value || null;
        t.endTime = t.endDate ? ($("[data-testid=bulk-end-time]").value || null) : null;
        changed = true;
      }
      if (on("esd")) { t.earliestStartDate = $("[data-testid=bulk-esd]").value || null; changed = true; }
      if (on("due")) {
        t.dueDate = $("[data-testid=bulk-due]").value || null;
        changed = true;
      }
      if (on("progress")) { t.progress = Number($("[data-testid=bulk-progress]").value); changed = true; }
      if (on("deps")) {
        const chosen = [...$("[data-testid=bulk-deps]").selectedOptions].map(o => o.value);
        const cur = new Set(t.blockedBy || []);
        for (const depId of chosen) {
          if (cur.has(depId)) continue;
          if (wouldCycle(t.id, depId)) { skippedDeps++; continue; }
          cur.add(depId);
        }
        t.blockedBy = [...cur];
        changed = true;
      }
      if (on("na")) {
        const what = $("[data-testid=bulk-na-what]").value.trim();
        const status = $("[data-testid=bulk-na-status]").value.trim();
        t.nextAction = (what || status) ? { what, status: status || null } : null;
        changed = true;
      }
      if (on("tags")) {
        t.tags = $("[data-testid=bulk-tags]").value.split(",").map(s => s.trim()).filter(Boolean);
        changed = true;
      }
      if (on("repeat")) {
        const unit = $("[data-testid=bulk-repeat-unit]").value;
        if (!unit) {
          t.repeat = null;
        } else {
          const interval = Math.max(1, parseInt($("[data-testid=bulk-repeat-interval]").value, 10) || 1);
          const from = $("[data-testid=bulk-repeat-from]").value === "completion" ? "completion" : "due";
          const until = $("[data-testid=bulk-repeat-until]").value || null;
          const byDay = unit === "week"
            ? [...m.querySelectorAll("[data-testid=bulk-repeat-days] input:checked")].map(cb => Number(cb.value)).sort((a, b) => a - b)
            : undefined;
          t.repeat = { unit, interval, from, ...(until ? { until } : {}), ...(byDay && byDay.length ? { byDay } : {}) };
        }
        changed = true;
      }
      if (changed) { touch(t); touched++; }
    }
    closeModal();
    if (touched) { selectedTaskIds.clear(); commit(); }
    let msg = `${touched}件のタスクを更新しました`;
    if (skippedDeps) msg += `（依存タスクの追加は${skippedDeps}件、循環依存のためスキップ）`;
    toast(msg);
  };
}

  「今日すること」ページ（仕様12）

function renderToday(body, actions) {
  const isG = ganttToggle(actions, "today", `
    <button class="btn small" data-testid="today-reset-order" style="margin-left:8px">自動順に戻す</button>
    <button class="btn small primary" data-testid="today-add" style="margin-left:6px">＋今日やる</button>`);
  if (isG) {
    drawGantt(body, ganttRowsFor(excludeNested(todayTasks())));
    return;
  }
  actions.querySelector("[data-testid=today-reset-order]").onclick = () => {
    state.today.manualOrder = null;
    state.today.updatedAt = nowISO();
    commit();
    toast("自動優先順位に戻しました");
  };
  actions.querySelector("[data-testid=today-add]").onclick = openTodayPicker;

  const all = excludeNested(todayTasks()); // サブタスクは親の下にツリー表示
  // 並び順: 時間指定タスクだけを別セクションにまとめず、全タスクを1つの一覧にスコア順で並べる。
  // 時間指定は加点として評価（00:00〜12:00は+15点・12:00より後は+5点）に反映済み。
  let ordered = autoSortToday(all);
  if (state.today.manualOrder) {
    const idx = new Map(state.today.manualOrder.map((id, i) => [id, i]));
    ordered = ordered.slice().sort((a, b) => {
      const ia = idx.has(a.id) ? idx.get(a.id) : 1e9;
      const ib = idx.has(b.id) ? idx.get(b.id) : 1e9;
      return ia - ib;
    });
  }

  if (!ordered.length) {
    body.insertAdjacentHTML("beforeend", `<div class="empty-msg">今日着手できるタスクはありません 🎉<br>
      <span style="font-size:12px">ブロック中・開始可能日前のタスクはここに表示されません</span></div>`);
  }

  const listWrap = document.createElement("div");
  listWrap.id = "today-list";
  body.appendChild(listWrap);
  for (const t of ordered) {
    const row = taskRowEl(t, { showProject: true, tree: true });
    row.classList.add("today-row");
    row.draggable = true;
    // スコアバッジ（時間指定の加点も含めた総合スコア）
    row.title = scoreBreakdown(t);
    const sc = document.createElement("div");
    sc.className = "today-score";
    sc.setAttribute("data-testid", "today-score");
    sc.textContent = Math.round(autoPriorityScore(t));
    row.insertBefore(sc, row.querySelector(".t-main"));
    // 先送りボタン
    const pp = document.createElement("button");
    pp.className = "btn small";
    pp.setAttribute("data-testid", "postpone-btn");
    pp.textContent = "明日へ";
    pp.style.cssText = "margin-top:1px;flex:none";
    pp.onclick = e => { e.stopPropagation(); postponeTask(t.id, 1); };
    row.appendChild(pp);
    // D&D: 上下端=実行順の並び替え / 中央=サブタスク化 / サブタスクを上下端に落とすと引き出し
    row.addEventListener("dragstart", e => {
      // 複数選択中の行をドラッグしたら、選択している全タスクをまとめて運ぶ
      const ids = selectedTaskIds.has(t.id) && selectedTaskIds.size > 1 ? [...selectedTaskIds] : [t.id];
      e.dataTransfer.setData("text/plain", JSON.stringify(ids));
      e.dataTransfer.effectAllowed = "move";
    });
    const clearMarks = () => row.classList.remove("drop-before", "drop-after", "drop-into");
    row.addEventListener("dragover", e => {
      e.preventDefault();
      const rect = row.getBoundingClientRect();
      const y = e.clientY - rect.top;
      clearMarks();
      if (y < rect.height * 0.28) row.classList.add("drop-before");
      else if (y > rect.height * 0.72) row.classList.add("drop-after");
      else row.classList.add("drop-into");
    });
    row.addEventListener("dragleave", clearMarks);
    row.addEventListener("drop", e => {
      e.preventDefault();
      const mode = row.classList.contains("drop-before") ? "before"
        : row.classList.contains("drop-after") ? "after" : "into";
      clearMarks();
      const dragIds = parseDragIds(e).filter(id => id !== t.id);
      if (!dragIds.length) return;
      if (mode === "into") { // サブタスク化（まとめて）
        if (dragIds.length > 1) handleTaskDropMulti(dragIds, t.id, "into");
        else handleTaskDrop(dragIds[0], t.id, "into");
        return;
      }
      const ids = ordered.map(x => x.id);
      if (dragIds.every(id => ids.includes(id))) {
        // 今日リスト内の実行順並び替え（従来どおり。複数選択時は元の相互順序を保ったままブロックで移動）
        const dragSet = new Set(dragIds);
        const draggedInOrder = ids.filter(id => dragSet.has(id));
        const rest = ids.filter(id => !dragSet.has(id));
        let pos = rest.indexOf(t.id);
        if (mode === "after") pos += 1;
        rest.splice(pos, 0, ...draggedInOrder);
        state.today.manualOrder = rest;
        state.today.updatedAt = nowISO();
        commit();
      } else if (dragIds.length > 1) {
        // リスト外（サブタスク等）を含む複数選択のドロップ → まとめて構造変更
        handleTaskDropMulti(dragIds, t.id, mode);
      } else {
        // リスト外（サブタスク等）からのドロップ → 構造の変更（トップレベルへ引き出し等）
        handleTaskDrop(dragIds[0], t.id, mode);
      }
    });
    listWrap.appendChild(row);
    appendTaskKids(listWrap, t, 0, { showProject: false, dnd: true }); // サブタスクもD&D可能なツリー表示
  }

  // 待機中（ブロック中/開始可能日前で今日やる理由のあるもの・人に任せて返信待ちのもの）をまとめて参考表示
  const waitingTasks = activeTasks().filter(t => t.waitingOnOther || (!canStart(t) && hasTodayReason(t)));
  if (waitingTasks.length) {
    body.insertAdjacentHTML("beforeend", `<div class="today-head" data-testid="waiting-head">🔒 待機中（着手不可・返信待ちのため一覧外）</div>`);
    for (const t of waitingTasks) {
      const row = taskRowEl(t, { showProject: true });
      if (t.waitingOnOther) {
        row.setAttribute("data-testid", "delegated-row");
        const backBtn = document.createElement("button");
        backBtn.className = "btn small";
        backBtn.setAttribute("data-testid", "delegate-release-btn");
        backBtn.textContent = "🔓 解除";
        backBtn.style.cssText = "margin-top:1px;flex:none";
        backBtn.onclick = e => { e.stopPropagation(); toggleDelegated(t.id); };
        row.appendChild(backBtn);
      }
      body.appendChild(row);
    }
  }
}

function renderDashboard(body) {
  const today = todayStr();
  const tomorrow = addDays(today, 1);
  const weekEnd = addDays(today, 6);
  const act = activeTasks();

  const isOn = (t, d) =>
    (t.dueDate === d) ||
    (t.startDate && t.startDate <= d && (t.endDate || t.startDate) >= d);

  const cards = [
    { title: "🔥 今日のアクション", tasks: act.filter(t => isOn(t, today)), testid: "dash-today" },
    { title: "🌅 明日のアクション", tasks: act.filter(t => isOn(t, tomorrow)), testid: "dash-tomorrow" },
    { title: "🗓 今週のアクション", tasks: act.filter(t => { for (let d = today; d <= weekEnd; d = addDays(d, 1)) if (isOn(t, d)) return true; return false; }), testid: "dash-week" },
    { title: "⚠️ 期限超過", tasks: act.filter(t => t.dueDate && t.dueDate < today), alert: true, testid: "dash-overdue" },
    { title: "📌 本日期日", tasks: act.filter(t => t.dueDate === today), testid: "dash-duetoday" },
  ];

  const grid = document.createElement("div");

    card.setAttribute("data-testid", c.testid);

    if (!c.tasks.length) card.insertAdjacentHTML("beforeend", `<div style="color:var(--text-faint);font-size:12px">なし</div>`);
    for (const t of c.tasks.slice(0, 8)) {

    if (c.tasks.length > 8) card.insertAdjacentHTML("beforeend", `<div style="color:var(--text-faint);font-size:11px;padding:4px 2px">他${c.tasks.length - 8}件</div>`);

  psCard.setAttribute("data-testid", "dash-projects");
  psCard.innerHTML = `<h3>📁 プロジェクトサマリー</h3>`;
  const projs = visibleProjects().sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0));
  if (!projs.length) psCard.insertAdjacentHTML("beforeend", `<div style="color:var(--text-faint);font-size:12px">プロジェクトがありません</div>`);
  for (const p of projs) {
    const all = liveTasks().filter(t => t.projectId === p.id);

    const od = all.filter(t => t.status === "active" && t.dueDate && t.dueDate < today).length;

    const el = document.createElement("div");
    el.className = "proj-sum";
    el.innerHTML = `
      <div style="display:flex;align-items:center;gap:6px">

      <div class="bar-bg"><div class="bar-fg" style="width:${pct}%"></div></div>

    el.onclick = () => setView({ type: "project", id: p.id });

  grid.appendChild(psCard);

const G_ROW = 34, G_BAR_H = 18, G_HDR = 34;
const G_ZOOM = { day: 36, week: 14, month: 5 }; // 1日あたりpx

function renderGanttView(body, actions, title) {
  const isAll = view.id === "__all"; // 全プロジェクト横断ビュー
  const p = isAll ? null : getProject(view.id);
  if (!isAll && !p) { setView({ type: "today" }); return; }
  title.innerHTML = isAll
    ? "📈 ガントチャート（全プロジェクト）"
    : `<span class="proj-dot" style="background:${p.color};display:inline-block;margin-right:6px"></span>${esc(p.name)} — ガント`;

  actions.innerHTML = `
    ${isAll ? "" : `<div class="btn-group">
      <button class="btn" data-testid="view-list-btn">リスト</button>
      <button class="btn on" data-testid="view-gantt-btn">ガント</button>
    </div>`}
    <div class="btn-group" style="margin-left:8px">
      ${["day", "week", "month"].map(z => `<button class="btn small ${ganttZoom === z ? "on" : ""}" data-zoom="${z}" data-testid="zoom-${z}">${{ day: "日", week: "週", month: "月" }[z]}</button>`).join("")}
    </div>
    <button class="btn small ${state.settings.ganttHideDone ? "on" : ""}" data-testid="gantt-hide-done" style="margin-left:8px" title="完了タスクの表示/非表示">完了を隠す</button>`;
  if (!isAll) actions.querySelector("[data-testid=view-list-btn]").onclick = () => setView({ type: "project", id: p.id });
  actions.querySelectorAll("[data-zoom]").forEach(b => {
    b.onclick = () => { ganttZoom = b.dataset.zoom; ganttScrollMemo = null; render(); };
  });
  actions.querySelector("[data-testid=gantt-hide-done]").onclick = () => {
    state.settings.ganttHideDone = !state.settings.ganttHideDone;
    save();
    render();
  };

  // ---- 行を構築（プロジェクト/セクション見出し + タスク + サブタスク） ----
  const rows = []; // {kind:'proj'|'sec'|'task', proj?, sec?, task?, depth}
  const bySort = (a, b) => a.sortOrder - b.sortOrder;
  const pushTree = (t, depth) => {
    if (state.settings.ganttHideDone && t.status === "completed") return; // 完了を隠す（サブツリーごと）
    rows.push({ kind: "task", task: t, depth });
    for (const k of state.tasks.filter(x => x.parentTaskId === t.id && !x.deletedAt).sort(bySort)) {
      if (depth < 5) pushTree(k, depth + 1);
    }
  };
  if (isAll) {
    // プロジェクトごとにグループ化。プロジェクトなし（Inbox）は日付付きタスクのみ表示
    for (const proj of visibleProjects().sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0))) {
      const tasks = liveTasks().filter(t => t.projectId === proj.id && !t.parentTaskId).sort(bySort);
      if (!tasks.length) continue;
      rows.push({ kind: "proj", proj });
      if (!proj.ganttCollapsed) for (const t of tasks) pushTree(t, 0);
    }
    const inboxTasks = liveTasks().filter(t => !t.projectId && !t.parentTaskId && (t.startDate || t.dueDate)).sort(bySort);
    if (inboxTasks.length) {
      rows.push({ kind: "proj", proj: null });
      for (const t of inboxTasks) pushTree(t, 0);
    }
  } else {
    const tasks = liveTasks().filter(t => t.projectId === p.id && !t.parentTaskId).sort(bySort);
    const secs = state.sections.filter(s => s.projectId === p.id).sort(bySort);
    for (const t of tasks.filter(t => !t.sectionId || !secs.find(s => s.id === t.sectionId))) pushTree(t, 0);
    for (const s of secs) {
      rows.push({ kind: "sec", sec: s });
      if (!s.collapsed) for (const t of tasks.filter(t => t.sectionId === s.id)) pushTree(t, 0);
    }
  }
  drawGantt(body, rows);
}

/* ---- 各ビュー共通: リスト/ガント切替の状態（ビューごと・セッション内） ---- */
const viewGantt = {};

// 表示中のタスク一覧からガント用の行データを構築（プロジェクト別にグループ化）
function ganttRowsFor(tasks) {
  const rows = [];
  const bySort = (a, b) => a.sortOrder - b.sortOrder;
  const pushTree = (t, depth) => {
    if (state.settings.ganttHideDone && t.status === "completed") return; // 完了を隠す（サブツリーごと）
    rows.push({ kind: "task", task: t, depth });
    if (depth < 5) for (const k of state.tasks.filter(x => x.parentTaskId === t.id && !x.deletedAt).sort(bySort)) pushTree(k, depth + 1);
  };
  const groups = new Map(); // projectId -> tasks（出現順）
  for (const t of tasks) {
    const pid = t.projectId || "";
    if (!groups.has(pid)) groups.set(pid, []);
    groups.get(pid).push(t);
  }
  for (const [pid, list] of groups) {
    const proj = pid ? getProject(pid) : null;
    rows.push({ kind: "proj", proj });
    if (proj && proj.ganttCollapsed) continue;
    for (const t of list) pushTree(t, 0);
  }
  return rows;
}

// ビューヘッダーに「リスト｜ガント」切替を作る。戻り値=ガントモードかどうか
function ganttToggle(actions, key, extraHtml) {
  const isG = !!viewGantt[key];
  actions.innerHTML = `
    <div class="btn-group">
      <button class="btn small ${!isG ? "on" : ""}" data-testid="mode-list">リスト</button>
      <button class="btn small ${isG ? "on" : ""}" data-testid="mode-gantt">ガント</button>
    </div>${isG
      ? `<div class="btn-group" style="margin-left:8px">
          ${["day", "week", "month"].map(z => `<button class="btn small ${ganttZoom === z ? "on" : ""}" data-zoom="${z}" data-testid="zoom-${z}">${{ day: "日", week: "週", month: "月" }[z]}</button>`).join("")}
        </div>
        <button class="btn small ${state.settings.ganttHideDone ? "on" : ""}" data-testid="gantt-hide-done" style="margin-left:8px" title="完了タスクの表示/非表示">完了を隠す</button>`
      : (extraHtml || "")}`;
  actions.querySelector("[data-testid=mode-list]").onclick = () => { viewGantt[key] = false; ganttScrollMemo = null; render(); };
  actions.querySelector("[data-testid=mode-gantt]").onclick = () => { viewGantt[key] = true; ganttScrollMemo = null; render(); };
  actions.querySelectorAll("[data-zoom]").forEach(b => {
    b.onclick = () => { ganttZoom = b.dataset.zoom; ganttScrollMemo = null; render(); };
  });
  const hideDoneBtn = actions.querySelector("[data-testid=gantt-hide-done]");
  if (hideDoneBtn) hideDoneBtn.onclick = () => {
    state.settings.ganttHideDone = !state.settings.ganttHideDone;
    save();
    render();
  };
  return isG;
}

// 行データからガントチャートを描画（全ビュー共通エンジン）
function drawGantt(body, rows) {
  if (!rows.length) {
    body.insertAdjacentHTML("beforeend", `<div class="empty-msg">ガントに表示できるタスクがありません</div>`);
    return;
  }
  // ---- 期間レンジ ----
  const today = todayStr();
  let min = today, max = today;
  for (const r of rows) {
    if (r.kind !== "task") continue;
    const t = r.task;
    for (const d of [t.startDate, t.endDate, t.dueDate, t.earliestStartDate]) {
      if (!d) continue;
      if (d < min) min = d;
      if (d > max) max = d;
    }
  }
  const rangeStart = addDays(min, -7);
  const rangeEnd = addDays(max, ganttZoom === "month" ? 45 : 14);
  const days = diffDays(rangeEnd, rangeStart) + 1;
  const dw = G_ZOOM[ganttZoom];
  const W = days * dw, H = rows.length * G_ROW;
  const dx = d => diffDays(d, rangeStart) * dw;

  // ---- 左：タスク名列 ----
  const wrap = document.createElement("div");
  wrap.id = "gantt-wrap";
  const names = document.createElement("div");
  names.id = "gantt-names";
  names.innerHTML = `<div class="g-hdr-row">タスク</div>` + rows.map(r => {
    if (r.kind === "proj") {
      const proj = r.proj;
      return `<div class="g-name-row head" data-proj-row="${proj ? proj.id : ""}" data-testid="gantt-proj-row">
        ${proj ? `<span class="tri" style="font-size:9px">${proj.ganttCollapsed ? "▶" : "▼"}</span>` : ""}
        <span class="proj-dot" style="background:${proj ? proj.color : "var(--text-faint)"}"></span>
        <span class="nm">${proj ? esc(proj.name) : "📥 受信トレイ"}</span></div>`;
    }
    if (r.kind === "sec") return `<div class="g-name-row head" data-sec="${r.sec.id}"><span class="tri" style="font-size:9px">${r.sec.collapsed ? "▶" : "▼"}</span><span class="nm">${esc(r.sec.name)}</span></div>`;
    const t = r.task;
    const mark = t.status === "completed" ? "✓ " : isBlocked(t) ? "🔒" : isWaiting(t) ? "⏳" : "";
    return `<div class="g-name-row" data-task="${t.id}" data-testid="gantt-name" style="padding-left:${8 + r.depth * 14}px">
      <span class="nm" style="${t.status === "completed" ? "text-decoration:line-through;color:var(--text-faint)" : ""}">${mark}${esc(t.title)}</span></div>`;
  }).join("");
  names.querySelectorAll("[data-sec]").forEach(el => {
    el.onclick = () => { const s = getSection(el.dataset.sec); s.collapsed = !s.collapsed; commit(); };
  });
  names.querySelectorAll("[data-proj-row]").forEach(el => {
    el.onclick = () => {
      const proj = getProject(el.dataset.projRow);
      if (proj) { proj.ganttCollapsed = !proj.ganttCollapsed; commit(); }
    };
  });
  names.querySelectorAll("[data-task]").forEach(el => {
    el.onclick = () => openTaskModal(el.dataset.task);
  });

  // ---- 右：タイムラインSVG ----
  const scroll = document.createElement("div");
  scroll.id = "gantt-scroll";
  const NS = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(NS, "svg");
  svg.setAttribute("width", W);
  svg.setAttribute("height", H + G_HDR);
  svg.setAttribute("data-testid", "gantt-svg");
  svg.style.display = "block";

  let defs = `<defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 z" fill="var(--text-dim)"/></marker></defs>`;
  let gridHtml = "", hdrHtml = "", barsHtml = "", depHtml = "";

  // グリッド・ヘッダー
  for (let i = 0; i < days; i++) {
    const d = addDays(rangeStart, i);
    const dt = parseDate(d);
    const x = i * dw;
    const isWeekend = dt.getDay() === 0 || dt.getDay() === 6;
    if (isWeekend && ganttZoom !== "month") gridHtml += `<rect x="${x}" y="${G_HDR}" width="${dw}" height="${H}" fill="rgba(255,255,255,.03)"/>`;
    if (ganttZoom === "day") {
      gridHtml += `<line x1="${x}" y1="${G_HDR}" x2="${x}" y2="${H + G_HDR}" stroke="var(--bg3)" stroke-width="1"/>`;
      hdrHtml += `<text x="${x + dw / 2}" y="${G_HDR - 12}" text-anchor="middle" font-size="10" fill="${isWeekend ? "var(--text-faint)" : "var(--text-dim)"}">${dt.getDate()}</text>`;
      if (dt.getDate() === 1 || i === 0) hdrHtml += `<text x="${x + 2}" y="12" font-size="10" font-weight="bold" fill="var(--text-dim)">${dt.getFullYear()}/${dt.getMonth() + 1}</text>`;
    } else if (ganttZoom === "week") {
      if (dt.getDay() === 1) { // 月曜
        gridHtml += `<line x1="${x}" y1="${G_HDR}" x2="${x}" y2="${H + G_HDR}" stroke="var(--bg3)" stroke-width="1"/>`;
        hdrHtml += `<text x="${x + 2}" y="${G_HDR - 12}" font-size="10" fill="var(--text-dim)">${dt.getMonth() + 1}/${dt.getDate()}</text>`;
      }
      if (dt.getDate() === 1 || i === 0) hdrHtml += `<text x="${x + 2}" y="12" font-size="10" font-weight="bold" fill="var(--text-dim)">${dt.getFullYear()}/${dt.getMonth() + 1}</text>`;
    } else { // month
      if (dt.getDate() === 1 || i === 0) {
        gridHtml += `<line x1="${x}" y1="${G_HDR}" x2="${x}" y2="${H + G_HDR}" stroke="var(--bg3)" stroke-width="1"/>`;
        hdrHtml += `<text x="${x + 3}" y="${G_HDR - 12}" font-size="10" fill="var(--text-dim)">${dt.getFullYear()}/${dt.getMonth() + 1}</text>`;
      }
    }
  }
  // 行の区切り線
  for (let r = 0; r <= rows.length; r++) {
    gridHtml += `<line x1="0" y1="${G_HDR + r * G_ROW}" x2="${W}" y2="${G_HDR + r * G_ROW}" stroke="var(--bg3)" stroke-width="1"/>`;
  }
  // プロジェクト/セクション見出し行の背景
  rows.forEach((r, i) => {
    if (r.kind === "sec" || r.kind === "proj") gridHtml += `<rect x="0" y="${G_HDR + i * G_ROW}" width="${W}" height="${G_ROW}" fill="rgba(255,255,255,.04)"/>`;
  });
  // 今日線
  const tx = dx(today) + dw / 2;
  gridHtml += `<line x1="${tx}" y1="${G_HDR - 6}" x2="${tx}" y2="${H + G_HDR}" stroke="var(--danger)" stroke-width="1.5" data-testid="today-line"/>
    <text x="${tx}" y="${G_HDR - 24}" text-anchor="middle" font-size="9" fill="var(--danger)">今日</text>`;

  // ---- バー ----
  const rowIndexByTask = new Map();
  rows.forEach((r, i) => { if (r.kind === "task") rowIndexByTask.set(r.task.id, i); });

  rows.forEach((r, i) => {
    if (r.kind !== "task") return;
    const t = r.task;
    const y = G_HDR + i * G_ROW + (G_ROW - G_BAR_H) / 2;
    const blocked = isBlocked(t);
    const color = t.priority !== "none" ? PRIO_COLOR[t.priority] : (getProject(t.projectId)?.color || "var(--accent)");

    // 開始可能日の制約マーカー
    if (t.earliestStartDate) {
      const ex = dx(t.earliestStartDate);
      barsHtml += `<line x1="${ex}" y1="${y - 3}" x2="${ex}" y2="${y + G_BAR_H + 3}" stroke="var(--warn)" stroke-width="2" stroke-dasharray="3,2"/>`;
    }
    if (t.startDate && t.endDate) {
      const x = dx(t.startDate);
      const w = Math.max(dw * .6, (diffDays(t.endDate, t.startDate) + 1) * dw);
      const opacity = t.status === "completed" ? .35 : blocked ? .45 : 1;
      barsHtml += `<g class="gbar" data-task="${t.id}" data-testid="gantt-bar" style="cursor:${blocked ? "not-allowed" : "grab"}">
        <rect x="${x}" y="${y}" width="${w}" height="${G_BAR_H}" rx="4" fill="${color}" opacity="${opacity * .45}"/>
        <rect x="${x}" y="${y}" width="${w * (t.progress || 0) / 100}" height="${G_BAR_H}" rx="4" fill="${color}" opacity="${opacity}" data-role="progress"/>
        <rect x="${x}" y="${y}" width="${w}" height="${G_BAR_H}" rx="4" fill="none" stroke="${color}" opacity="${opacity}"/>
        ${blocked ? `<text x="${x + w / 2}" y="${y + 13}" text-anchor="middle" font-size="10">🔒</text>` : ""}
        <rect data-role="handle-l" x="${x - 3}" y="${y}" width="7" height="${G_BAR_H}" fill="transparent" style="cursor:ew-resize"/>
        <rect data-role="handle-r" x="${x + w - 4}" y="${y}" width="7" height="${G_BAR_H}" fill="transparent" style="cursor:ew-resize"/>
      </g>`;
    }
    // マイルストーン（納期の菱形）
    if (t.dueDate) {
      const mx = dx(t.dueDate) + dw / 2, my = y + G_BAR_H / 2;
      const late = t.status === "active" && t.dueDate < today;
      barsHtml += `<path d="M${mx},${my - 7} L${mx + 7},${my} L${mx},${my + 7} L${mx - 7},${my} Z"
        fill="${late ? "var(--danger)" : "var(--milestone)"}" data-task="${t.id}" data-testid="gantt-milestone" style="cursor:pointer"/>`;
    }
    // 日付なしタスクのラベル
    if (!t.startDate && !t.dueDate) {
      barsHtml += `<text x="${tx + 8}" y="${y + 13}" font-size="10" fill="var(--text-faint)" data-task="${t.id}" style="cursor:pointer">（日付未設定）</text>`;
    }
  });

  // ---- 依存線（FS: 先行の終了 → 後続の開始） ----
  rows.forEach((r, i) => {
    if (r.kind !== "task") return;
    const t = r.task;
    for (const depId of t.blockedBy || []) {
      const pre = getTask(depId);
      if (!pre || pre.deletedAt || !rowIndexByTask.has(depId)) continue;
      const pi = rowIndexByTask.get(depId);
      const preEnd = pre.endDate || pre.dueDate || pre.startDate;
      const tStart = t.startDate || t.dueDate;
      if (!preEnd || !tStart) continue;
      const x1 = dx(preEnd) + dw;
      const y1 = G_HDR + pi * G_ROW + G_ROW / 2;
      const x2 = dx(tStart);
      const y2 = G_HDR + i * G_ROW + G_ROW / 2;
      const bend = Math.max(x1 + 8, x2 - 8);
      depHtml += `<path d="M${x1},${y1} L${x1 + 6},${y1} L${x1 + 6},${y2} L${x2 - 2},${y2}"
        fill="none" stroke="var(--text-dim)" stroke-width="1.3" marker-end="url(#arrow)" data-testid="dep-line" opacity=".8"/>`;
    }
  });

  svg.innerHTML = defs + gridHtml + depHtml + barsHtml + hdrHtml;
  scroll.appendChild(svg);
  wrap.appendChild(names);
  wrap.appendChild(scroll);
  body.appendChild(wrap);
  body.insertAdjacentHTML("beforeend", `<div style="color:var(--text-faint);font-size:11px;margin-top:8px">
    バー: ドラッグで移動・端で伸縮 / ◆=納期 / 黄点線=開始可能日 / 🔒=依存タスク未完了 / 依存の設定はタスク編集画面から</div>`);

  // スクロール位置: 記憶があれば復元、なければ今日を中央付近に（同期的に設定し、
  // 描画後のズレでドラッグ座標が狂わないようにする）
  scroll.scrollLeft = ganttScrollMemo !== null ? ganttScrollMemo : Math.max(0, dx(today) - scroll.clientWidth / 3);
  scroll.addEventListener("scroll", () => { ganttScrollMemo = scroll.scrollLeft; });

  // ---- ドラッグ操作 ----
  attachGanttDrag(svg, dw, rangeStart);
  // マイルストーン・日付なしラベルのクリック
  svg.querySelectorAll("[data-testid=gantt-milestone], text[data-task]").forEach(el => {
    el.addEventListener("click", () => openTaskModal(el.dataset.task));
  });
}

function attachGanttDrag(svg, dw, rangeStart) {
  let drag = null; // {taskId, mode, startX, origStart, origEnd, moved}
  svg.querySelectorAll(".gbar").forEach(g => {
    g.addEventListener("pointerdown", e => {
      const taskId = g.dataset.task;
      const t = getTask(taskId);
      if (!t) return;
      const role = e.target.dataset.role;
      drag = {
        taskId,
        mode: role === "handle-l" ? "l" : role === "handle-r" ? "r" : "move",
        startX: e.clientX,
        origStart: t.startDate, origEnd: t.endDate,
        moved: false, g,
      };
      g.setPointerCapture(e.pointerId);
      e.preventDefault();
    });
    g.addEventListener("pointermove", e => {
      if (!drag || drag.g !== g) return;
      const deltaDays = Math.round((e.clientX - drag.startX) / dw);
      if (Math.abs(e.clientX - drag.startX) > 3) drag.moved = true;
      if (!drag.moved) return;
      const t = getTask(drag.taskId);
      let ns = drag.origStart, ne = drag.origEnd;
      if (drag.mode === "move") {
        ns = addDays(drag.origStart, deltaDays);
        ne = addDays(drag.origEnd, deltaDays);
        // 開始可能日より前には置けない（仕様11.5）
        if (t.earliestStartDate && ns < t.earliestStartDate) {
          const shift = diffDays(t.earliestStartDate, ns);
          ns = addDays(ns, shift); ne = addDays(ne, shift);
        }
      } else if (drag.mode === "l") {
        ns = addDays(drag.origStart, deltaDays);
        if (t.earliestStartDate && ns < t.earliestStartDate) ns = t.earliestStartDate;
        if (ns > ne) ns = ne;
      } else {
        ne = addDays(drag.origEnd, deltaDays);
        if (ne < ns) ne = ns;
      }
      drag.newStart = ns; drag.newEnd = ne;
      // プレビュー描画（rect群を直接動かす）
      const x = diffDays(ns, rangeStart) * dw;
      const w = Math.max(dw * .6, (diffDays(ne, ns) + 1) * dw);
      const rects = g.querySelectorAll("rect");
      rects[0].setAttribute("x", x); rects[0].setAttribute("width", w);
      rects[1].setAttribute("x", x); rects[1].setAttribute("width", w * (getTask(drag.taskId).progress || 0) / 100);
      rects[2].setAttribute("x", x); rects[2].setAttribute("width", w);
      const hl = g.querySelector("[data-role=handle-l]"), hr = g.querySelector("[data-role=handle-r]");
      hl.setAttribute("x", x - 3); hr.setAttribute("x", x + w - 4);
    });
    g.addEventListener("pointerup", e => {
      if (!drag || drag.g !== g) return;
      const d = drag; drag = null;
      const t = getTask(d.taskId);
      if (!d.moved) { openTaskModal(d.taskId); return; }
      if (!t || !d.newStart) { render(); return; }
      t.startDate = d.newStart;
      t.endDate = d.newEnd;
      // 依存タスクとの整合警告（仕様11.5: 警告のみ、保存は許可）
      const conflicts = (t.blockedBy || []).map(getTask).filter(p => p && !p.deletedAt && p.status !== "completed" && p.endDate && p.endDate > t.startDate);
      if (conflicts.length) toast(`⚠ 先行タスク「${conflicts[0].title}」の終了日より前に開始しています`, "warn");
      touch(t);
      commit();
    });
    g.addEventListener("pointercancel", () => { if (drag && drag.g === g) { drag = null; render(); } });
  });
}
/*========================================================
  メモ（仕様7）: Markdown対応・プロジェクト/タスク紐付け
========================================================*/
// 最小Markdownレンダラ（見出し・太字・斜体・リスト・チェックボックス・コード・リンク）
// opts.interactive: チェックボックスをクリック可能にする（data-mdline=元テキストの行番号）
// 記法: チェックリスト=() /(x)、見出し=行全体を**テキスト**、太字=*テキスト*（簡略化した独自記法）
// 旧記法（- [ ] 、# 見出し、**太字**インライン）も後方互換として引き続き解釈する
function renderMarkdown(src, opts = {}) {
  const lines = String(src || "").split("\n");
  let html = "", inList = false;
  const inline = s => esc(s)
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>") // 旧: インライン太字（後方互換）
    .replace(/\*([^*\n]+)\*/g, "<strong>$1</strong>") // 新: 太字
    .replace(/`([^`]+)`/g, "<code>$1</code>")
    .replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g, `<a href="$2" target="_blank" rel="noopener">$1</a>`);
  const closeList = () => { if (inList) { html += "</ul>"; inList = false; } };
  for (let li = 0; li < lines.length; li++) {
    const line = lines[li];
    let mch;
    if ((mch = line.trim().match(/^\*\*(.+)\*\*$/))) {
      // 新: 見出し（行全体が**テキスト**）
      closeList();
      html += `<h3>${inline(mch[1])}</h3>`;
    } else if ((mch = line.match(/^(#{1,3})\s+(.*)/))) {
      // 旧: 見出し（#の数で階層、後方互換）
      closeList();
      html += `<h${mch[1].length}>${inline(mch[2])}</h${mch[1].length}>`;
    } else if ((mch = line.match(/^\s*\(([ xX]?)\)\s+(.*)/))) {
      // 新: チェックリスト（）/(x)
      if (!inList) { html += "<ul>"; inList = true; }
      const done = mch[1] !== "" && mch[1] !== " ";
      html += `<li class="chk"><input type="checkbox" ${opts.interactive ? `data-mdline="${li}"` : "disabled"} ${done ? "checked" : ""}> ${done ? `<span style="text-decoration:line-through;color:var(--text-faint)">${inline(mch[2])}</span>` : inline(mch[2])}</li>`;
    } else if ((mch = line.match(/^\s*-\s+\[([ xX])\]\s+(.*)/))) {
      // 旧: チェックリスト（- [ ] 、後方互換）
      if (!inList) { html += "<ul>"; inList = true; }
      const done = mch[1] !== " ";
      html += `<li class="chk"><input type="checkbox" ${opts.interactive ? `data-mdline="${li}"` : "disabled"} ${done ? "checked" : ""}> ${done ? `<span style="text-decoration:line-through;color:var(--text-faint)">${inline(mch[2])}</span>` : inline(mch[2])}</li>`;
    } else if ((mch = line.match(/^\s*[-*]\s+(.*)/))) {
      if (!inList) { html += "<ul>"; inList = true; }
      html += `<li>${inline(mch[1])}</li>`;
    } else if (line.trim() === "") {
      closeList();
    } else {
      closeList();
      html += `<p>${inline(line)}</p>`;
    }
  }
  closeList();
  return html;
}

function renderMemos(body, actions) {
  actions.innerHTML = `<button class="btn primary small" data-testid="add-memo-btn">＋新規メモ</button>`;
  actions.querySelector("button").onclick = () => {
    const memo = { id: uid(), title: "無題のメモ", body: "", projectId: null, taskId: null, tags: [], createdAt: nowISO(), updatedAt: nowISO(), deletedAt: null };
    state.memos.push(memo);
    editingMemoId = memo.id;
    memoPreview = false;
    commit();
  };

  const memos = state.memos.filter(m => !m.deletedAt).sort((a, b) => b.updatedAt < a.updatedAt ? -1 : 1);
  const layout = document.createElement("div");
  layout.id = "memo-layout";

  const list = document.createElement("div");
  list.id = "memo-list";
  if (!memos.length) list.innerHTML = `<div class="empty-msg" style="padding:20px 0">メモがありません</div>`;
  for (const memo of memos) {
    const el = document.createElement("div");
    el.className = "memo-item" + (memo.id === editingMemoId ? " active" : "");
    el.setAttribute("data-testid", "memo-item");
    const linked = memo.taskId ? getTask(memo.taskId)?.title : memo.projectId ? getProject(memo.projectId)?.name : null;
    el.innerHTML = `<div class="m-title">${esc(memo.title)}</div>
      <div class="m-date">${memo.updatedAt.slice(0, 10)}${linked ? " · 🔗" + esc(linked) : ""}</div>`;
    el.onclick = () => { editingMemoId = memo.id; render(); };
    list.appendChild(el);
  }
  layout.appendChild(list);

  const editor = document.createElement("div");
  editor.id = "memo-editor";
  const memo = state.memos.find(m => m.id === editingMemoId && !m.deletedAt);
  if (!memo) {
    editor.innerHTML = `<div class="empty-msg">メモを選択するか、＋新規メモで作成してください</div>`;
  } else {
    const projOpts = `<option value="">プロジェクト紐付けなし</option>` + visibleProjects().map(p =>
      `<option value="${p.id}" ${memo.projectId === p.id ? "selected" : ""}>📁 ${esc(p.name)}</option>`).join("");
    const linkedTask = memo.taskId ? liveTasks().find(t => t.id === memo.taskId) : null;
    editor.innerHTML = `
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <input id="memo-title" data-testid="memo-title" value="${esc(memo.title)}" style="flex:1;min-width:150px;font-weight:700">
        <button class="btn small ${memoPreview ? "" : "primary"}" data-testid="memo-edit-btn">編集</button>
        <button class="btn small ${memoPreview ? "primary" : ""}" data-testid="memo-preview-btn">プレビュー</button>
