<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a1a1a">
<title>GanTODO — ガントチャート付きTODO</title>
<style>
:root {
  --bg: #1a1a1a;
  --bg2: #222226;
  --bg3: #2a2a30;
  --bg-hover: #33333a;
  --text: #f0f0f0;
  --text-dim: #9a9aa5;
  --text-faint: #6a6a75;
  --border: #3a3a42;
  --accent: #4f9cf9;
  --accent-dim: #2b5aa0;
  --danger: #e5534b;
  --warn: #e8b93e;
  --ok: #57ab5a;
  --prio-high: #e5534b;
  --prio-medium: #e8b93e;
  --prio-low: #4f9cf9;
  --prio-none: #55555f;
  --milestone: #c678dd;
  --radius: 8px;
  --sidebar-w: 232px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", Meiryo, sans-serif;
  font-size: 14px;
  overflow: hidden;
}
button { font-family: inherit; }
input, select, textarea {
  font-family: inherit; font-size: 14px;
  background: var(--bg3); color: var(--text);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 6px 8px;
}
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
::placeholder { color: var(--text-faint); }

/* ===== Layout ===== */
#app { display: flex; height: 100%; }
#sidebar {
  width: var(--sidebar-w); min-width: var(--sidebar-w);
  background: var(--bg2); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow-y: auto;
  padding: 10px 8px calc(10px + env(safe-area-inset-bottom));
  z-index: 30;
}
#main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
#view-header {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 16px; border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
#view-title-row { display: flex; align-items: center; gap: 8px; margin-right: auto; min-width: 0; }
#view-title { font-size: 18px; font-weight: 700; }
#view-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
#view-body { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 12px 16px 80px; }

/* ===== Sidebar ===== */
.side-search { display: flex; margin-bottom: 10px; }
.side-search input { flex: 1; }
.nav-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px; border-radius: 6px; cursor: pointer;
  color: var(--text); user-select: none;
}
.nav-item:hover { background: var(--bg-hover); }
.nav-item.active { background: var(--accent-dim); }
/* プロジェクト一覧のドラッグ並び替え */
.nav-item.drop-before { box-shadow: inset 0 2px 0 var(--accent); }
.nav-item.drop-after { box-shadow: inset 0 -2px 0 var(--accent); }
.nav-item .cnt {
  margin-left: auto; font-size: 11px; color: var(--text-dim);
  background: var(--bg3); border-radius: 10px; padding: 1px 7px;
}
.nav-item .cnt.alert { background: var(--danger); color: #fff; }
.side-sec {
  display: flex; align-items: center;
  font-size: 11px; color: var(--text-faint); font-weight: 700;
  margin: 14px 6px 4px; letter-spacing: .5px;
}
.side-sec button {
  margin-left: auto; background: none; border: none; color: var(--text-dim);
  cursor: pointer; font-size: 15px; line-height: 1;
}
.side-sec button:hover { color: var(--accent); }
.proj-dot { width: 10px; height: 10px; border-radius: 3px; flex: none; }

/* ===== Header buttons ===== */
.btn {
  background: var(--bg3); color: var(--text);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 6px 12px; cursor: pointer; font-size: 13px;
}
.btn:hover { background: var(--bg-hover); }
.btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
.btn.primary:hover { filter: brightness(1.1); }
.btn.danger { color: var(--danger); border-color: var(--danger); background: none; }
.btn.small { padding: 3px 8px; font-size: 12px; }
.btn-group { display: flex; }
.btn-group .btn { border-radius: 0; border-right-width: 0; }
.btn-group .btn:first-child { border-radius: 6px 0 0 6px; }
.btn-group .btn:last-child { border-radius: 0 6px 6px 0; border-right-width: 1px; }
.btn-group .btn.on { background: var(--accent-dim); }

/* ===== Quick add ===== */
.quick-add { display: flex; gap: 8px; margin-bottom: 12px; }
.quick-add input { flex: 1; padding: 9px 12px; }

/* ===== Task list ===== */
.sec-head {
  display: flex; align-items: center; gap: 6px;
  font-weight: 700; color: var(--text-dim);
  margin: 14px 0 4px; cursor: pointer; user-select: none;
}
.sec-head .tri { transition: transform .15s; font-size: 10px; }
.sec-head.collapsed .tri { transform: rotate(-90deg); }
.task-row {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 7px 8px; border-radius: 6px; cursor: pointer;
  border-left: 3px solid transparent;
}
.task-row:hover { background: var(--bg-hover); }
/* Ctrl/Cmd+クリックでの複数選択 */
.task-row.selected { background: var(--accent-dim); outline: 1px solid var(--accent); outline-offset: -1px; }
/* ===== 一括編集バー ===== */
#bulk-bar {
  position: fixed; left: 50%; top: 12px; transform: translateX(-50%);
  z-index: 250; display: none; align-items: center; gap: 10px;
  background: var(--bg2); border: 1px solid var(--accent); border-radius: 10px;
  padding: 10px 14px; box-shadow: 0 8px 24px rgba(0,0,0,.5);
}
#bulk-bar.show { display: flex; }
#bulk-bar .count { font-weight: 700; color: var(--accent); white-space: nowrap; }
.bulk-field { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); }
.bulk-field:last-child { border-bottom: none; }
.bulk-field > label { display: flex; align-items: center; gap: 6px; width: 120px; min-width: 120px; font-size: 12px; font-weight: 600; color: var(--text); }
.bulk-field .bulk-inputs { flex: 1; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.bulk-field .bulk-inputs input, .bulk-field .bulk-inputs select { min-width: 0; }
.bulk-field.off .bulk-inputs { opacity: .4; pointer-events: none; }
/* D&D ドロップ位置の表示: 上端=前に挿入 / 下端=後ろに挿入 / 中央=サブタスク化 */
.task-row.drop-before { box-shadow: inset 0 2px 0 var(--accent); }
.task-row.drop-after { box-shadow: inset 0 -2px 0 var(--accent); }
.task-row.drop-into { background: var(--accent-dim); outline: 1px dashed var(--accent); }
.task-row.prio-high { border-left-color: var(--prio-high); }
.task-row.prio-medium { border-left-color: var(--prio-medium); }
.task-row.prio-low { border-left-color: var(--prio-low); }
.task-row.done .t-title { text-decoration: line-through; color: var(--text-faint); }
.task-row.blocked { opacity: .6; }
.task-check {
  width: 18px; height: 18px; min-width: 18px; margin-top: 1px;
  border: 2px solid var(--text-dim); border-radius: 5px; /* TickTick風の角丸四角 */
  cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
  font-size: 11px; color: transparent; background: none;
}
.task-check:hover { color: var(--text-faint); }
/* 優先度で枠の色を変える（TickTick風） */
.task-check.p-high { border-color: var(--prio-high); }
.task-check.p-medium { border-color: var(--prio-medium); }
.task-check.p-low { border-color: var(--prio-low); }
.task-check.checked { background: var(--ok); border-color: var(--ok); color: #fff; }
.t-main { flex: 1; min-width: 0; }
.t-title { word-break: break-word; }
.t-badges { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 3px; }
.badge {
  display: inline-block; max-width: 100%;
  font-size: 11px; padding: 1px 6px; border-radius: 4px;
  background: var(--bg3); color: var(--text-dim); white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis; vertical-align: bottom;
}
.badge.due { color: var(--warn); }
.badge.overdue { background: var(--danger); color: #fff; }
.badge.blocked { color: var(--danger); }
.badge.waiting { color: var(--warn); }
.badge.ready { color: var(--ok); }
.badge.tag { color: var(--accent); }
.badge.ms { color: var(--milestone); }
.t-prog {
  width: 46px; min-width: 46px; text-align: right;
  font-size: 11px; color: var(--text-dim); margin-top: 3px;
}
.subtasks { margin-left: 26px; }
.empty-msg { color: var(--text-faint); text-align: center; padding: 40px 0; }
.tw {
  background: none; border: none; color: var(--text-dim); cursor: pointer;
  width: 16px; min-width: 16px; padding: 0; margin-top: 3px; font-size: 9px;
  transition: transform .15s;
}
.tw.collapsed { transform: rotate(-90deg); }
.tw-sp { width: 16px; min-width: 16px; }

/* ===== Today page ===== */
.today-score {
  min-width: 34px; text-align: center; font-size: 11px; font-weight: 700;
  color: var(--accent); background: var(--bg3); border-radius: 4px;
  padding: 2px 4px; margin-top: 2px;
}
.today-row.dragover { border-top: 2px solid var(--accent); }
.today-head { display: flex; align-items: center; gap: 8px; margin: 16px 0 6px; font-weight: 700; color: var(--text-dim); }

/* ===== Dashboard ===== */
.dash-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
.dash-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; }
.dash-card h3 { font-size: 13px; color: var(--text-dim); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.dash-card h3 .cnt { margin-left: auto; font-size: 12px; }
.mini-task { display: flex; gap: 6px; padding: 4px 2px; cursor: pointer; border-radius: 4px; align-items: baseline; }
.mini-task:hover { background: var(--bg-hover); }
.mini-task .d { font-size: 11px; color: var(--text-dim); white-space: nowrap; }
.proj-sum { padding: 6px 2px; cursor: pointer; border-radius: 4px; }
.proj-sum:hover { background: var(--bg-hover); }
.proj-sum .bar-bg { height: 6px; background: var(--bg3); border-radius: 3px; margin-top: 4px; overflow: hidden; }
.proj-sum .bar-fg { height: 100%; background: var(--ok); }
.proj-sum .meta { display: flex; font-size: 11px; color: var(--text-dim); margin-top: 2px; gap: 8px; }

/* ===== Gantt ===== */
#gantt-wrap { display: flex; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; background: var(--bg2); }
#gantt-names { min-width: 200px; max-width: 200px; border-right: 1px solid var(--border); overflow: hidden; }
#gantt-scroll { flex: 1; overflow-x: auto; overflow-y: hidden; position: relative; }
.g-name-row {
  height: 34px; display: flex; align-items: center; gap: 5px;
  padding: 0 8px; font-size: 12px; border-bottom: 1px solid var(--bg3);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer;
}
.g-name-row:hover { background: var(--bg-hover); }
.g-name-row.head { font-weight: 700; color: var(--text-dim); background: var(--bg3); }
.g-name-row .nm { overflow: hidden; text-overflow: ellipsis; }
.g-hdr-row { height: 34px; display: flex; align-items: center; padding: 0 8px; font-size: 11px; color: var(--text-faint); font-weight: 700; border-bottom: 1px solid var(--bg3); }
svg text { user-select: none; }

/* ===== Memos ===== */
#memo-layout { display: flex; gap: 14px; height: 100%; }
#memo-list { width: 250px; min-width: 250px; overflow-y: auto; }
.memo-item { padding: 8px 10px; border-radius: 6px; cursor: pointer; border: 1px solid transparent; }
.memo-item:hover { background: var(--bg-hover); }
.memo-item.active { border-color: var(--accent); background: var(--bg3); }
.memo-item .m-title { font-weight: 600; }
.memo-item .m-date { font-size: 11px; color: var(--text-faint); margin-top: 2px; }
#memo-editor { flex: 1; display: flex; flex-direction: column; gap: 8px; min-width: 0; }
#memo-body { flex: 1; resize: none; min-height: 200px; line-height: 1.6; }
#memo-preview {
  flex: 1; overflow-y: auto; background: var(--bg2); border: 1px solid var(--border);
  border-radius: 6px; padding: 12px 16px; line-height: 1.7; min-height: 200px;
}
#memo-preview h1 { font-size: 20px; margin: 10px 0 6px; }
#memo-preview h2 { font-size: 17px; margin: 10px 0 6px; }
#memo-preview h3 { font-size: 15px; margin: 8px 0 4px; }
#memo-preview ul { margin: 4px 0 4px 22px; }
#memo-preview li.chk { list-style: none; margin-left: -18px; }
#memo-preview code { background: var(--bg3); padding: 1px 5px; border-radius: 4px; font-size: 13px; }
#memo-preview a { color: var(--accent); }
#memo-preview p { margin: 4px 0; }

/* ===== Modal ===== */
.modal-bg {
  position: fixed; inset: 0; background: rgba(0,0,0,.6);
  display: flex; align-items: center; justify-content: center; z-index: 100;
  padding: 16px;
}
.modal {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
  width: 560px; max-width: 100%; max-height: 92vh; overflow-y: auto;
  padding: 18px;
}
.modal h2 { font-size: 16px; margin-bottom: 14px; }
.f-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
.f-col { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 130px; }
.f-col > label { font-size: 11px; color: var(--text-dim); font-weight: 600; }
.f-col input, .f-col select, .f-col textarea { width: 100%; }
.f-col input[type="radio"], .f-col input[type="checkbox"] { width: auto; flex: none; margin: 0; }
.modal-foot { display: flex; gap: 8px; margin-top: 16px; }
.modal-foot .spacer { flex: 1; }
.dep-chip {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--bg3); border: 1px solid var(--border); border-radius: 12px;
  padding: 2px 8px; font-size: 12px; margin: 2px 4px 2px 0;
}
.dep-chip button { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 13px; }
.dep-search { position: relative; }
.dep-search-list {
  display: none; position: absolute; top: 100%; left: 0; right: 0; z-index: 10;
  background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
  max-height: 200px; overflow-y: auto; margin-top: 2px;
  box-shadow: 0 4px 14px rgba(0,0,0,.4);
}
.dep-search-item {
  display: flex; justify-content: space-between; gap: 8px;
  padding: 8px 10px; font-size: 13px; cursor: pointer;
}
.dep-search-item:hover { background: var(--bg2); }
.dep-search-proj { color: var(--text-dim); font-size: 11px; white-space: nowrap; }
.task-id-badge { color: var(--text-faint); font-size: 11px; font-family: monospace; white-space: nowrap; }
.dep-search-empty { padding: 8px 10px; font-size: 12px; color: var(--text-faint); }
.date-field { display: flex; gap: 4px; align-items: center; }
.date-field input[type="date"] { flex: 1; min-width: 0; }
.date-clear-btn {
  flex: none; width: 28px; height: 28px; padding: 0; font-size: 12px; line-height: 1;
  border: 1px solid var(--border); border-radius: 6px; background: var(--bg3); color: var(--text-dim); cursor: pointer;
}
.date-clear-btn:hover { color: var(--danger); border-color: var(--danger); }
.date-compact-btn {
  flex: 1; min-width: 0; height: 32px; padding: 0 8px; font-size: 13px; text-align: left;
  border: 1px solid var(--border); border-radius: 6px; background: var(--bg3); color: var(--text); cursor: pointer;
}
.date-compact-btn:hover { border-color: var(--accent); }
.subtask-line { display: flex; align-items: flex-start; gap: 6px; padding: 3px 0; }
.subtask-line .task-check { margin-top: 2px; } /* 複数行のタイトルでも先頭行のテキストに揃える */
.subtask-line .st-title { flex: 1; cursor: pointer; }
.subtask-line .st-title:hover { color: var(--accent); }
.subtask-line .st-title.done { text-decoration: line-through; color: var(--text-faint); }

/* ===== グローバル追加バー（TickTick風） ===== */
#global-add {
  display: flex; gap: 6px; align-items: center;
  padding: 10px 16px 0; position: relative;
}
#qa-input { flex: 1; padding: 9px 12px; border-radius: 8px; }
.qa-chip {
  background: var(--bg3); border: 1px solid var(--border); color: var(--text-dim);
  border-radius: 6px; padding: 7px 10px; cursor: pointer; font-size: 12px; white-space: nowrap;
}
.qa-chip:hover { background: var(--bg-hover); }
.qa-chip.on { border-color: var(--accent); color: var(--accent); }
#qa-popover {
  position: absolute; right: 16px; top: calc(100% + 4px);
  background: var(--bg3); border: 1px solid var(--border); border-radius: 10px;
  padding: 12px; z-index: 80; width: 270px; display: none;
  box-shadow: 0 8px 24px rgba(0,0,0,.5);
}
#qa-popover.open { display: block; }
.qa-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.qa-row:last-child { margin-bottom: 0; }
.qa-row > label { width: 54px; min-width: 54px; font-size: 11px; color: var(--text-dim); font-weight: 600; }
.qa-row input, .qa-row select { flex: 1; min-width: 0; }
.flag-btn { background: none; border: none; font-size: 19px; cursor: pointer; opacity: .35; padding: 2px 5px; line-height: 1; }
.flag-btn.sel { opacity: 1; transform: scale(1.15); }
.flag-btn:hover { opacity: .8; }

/* ===== 右サイド詳細パネル（TickTick風） ===== */
#detail-panel {
  display: none; background: var(--bg2); border-left: 1px solid var(--border);
  overflow-y: auto; overflow-x: hidden;
}
#detail-panel.open { display: block; width: 400px; min-width: 400px; padding: 14px 16px 40px; }
.dp-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.dp-close-btn { font-size: 16px; width: 34px; height: 34px; padding: 0; line-height: 1; }
.dp-flags { display: flex; gap: 2px; }
.dp-status { font-size: 11px; color: var(--text-dim); }
.dp-title {
  width: 100%; font-size: 16px; font-weight: 700;
  background: none; border: none; border-bottom: 1px solid var(--border);
  border-radius: 0; padding: 6px 2px;
}
.dp-title:focus { border-bottom-color: var(--accent); }
.dp-crumb { font-size: 12px; color: var(--text-dim); cursor: pointer; margin-bottom: 6px; }
.dp-crumb:hover { color: var(--accent); }
.dp-chips { display: flex; flex-wrap: wrap; gap: 4px; margin: 8px 0; cursor: pointer; }
.dp-chips:hover .badge { background: var(--bg-hover); }
.dp-foot {
  display: flex; gap: 6px; align-items: center;
  margin-top: 14px; padding-top: 10px; border-top: 1px solid var(--border);
}
.dp-proj { font-size: 12px; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
/* メモ欄: 初期高さ=画面の1/3、内容に応じて拡張 */
#tm-note, #tm-note-view { min-height: 33vh; width: 100%; }
#tm-note { resize: vertical; overflow: hidden; line-height: 1.6; }
#tm-note-view {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
  padding: 10px 12px; line-height: 1.7; cursor: text; word-break: break-word;
}
#tm-note-view h1 { font-size: 17px; margin: 8px 0 4px; }
#tm-note-view h2 { font-size: 15px; margin: 8px 0 4px; }
#tm-note-view h3 { font-size: 14px; margin: 6px 0 3px; }
#tm-note-view ul { margin: 4px 0 4px 20px; }
#tm-note-view li.chk { list-style: none; margin-left: -18px; }
#tm-note-view li.chk input { cursor: pointer; }
#tm-note-view code { background: var(--bg2); padding: 1px 5px; border-radius: 4px; font-size: 13px; }
#tm-note-view a { color: var(--accent); }
#tm-note-view p { margin: 4px 0; }
/* 添付 */
.att-item {
  display: flex; align-items: center; gap: 8px; padding: 5px 8px;
  border: 1px solid var(--border); border-radius: 6px; margin-bottom: 6px;
  background: var(--bg3);
}
.att-thumb { width: 56px; height: 56px; object-fit: cover; border-radius: 4px; cursor: pointer; background: var(--bg2); }
.att-name { flex: 1; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); text-decoration: none; }
.att-name:hover { color: var(--accent); text-decoration: underline; }
.att-size { font-size: 11px; color: var(--text-faint); white-space: nowrap; }
@media (max-width: 1000px) {
  #detail-panel.open {
    position: fixed; right: 0; top: 0; bottom: 0; z-index: 60;
    width: min(420px, 100vw); min-width: 0;
    box-shadow: -8px 0 24px rgba(0,0,0,.5);
  }
}
@media (max-width: 760px) {
  /* リスト｜ガント・自動順に戻す・＋今日やる・完了を隠す等を、折り返さず必ず1行に収める。
     入りきらない場合はこの行だけを横スワイプできるようにする（ページ全体はスクロールさせない）。 */
  #view-header { flex-wrap: nowrap; flex-direction: column; align-items: stretch; padding: 10px 12px; }
  #view-actions {
    flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch;

  }
  #view-actions .btn-group, #view-actions .btn { flex: none; white-space: nowrap; }

  /* iOS Safariは16px未満の入力欄にフォーカスすると自動ズームするため、スマホでは16pxに */
  input, select, textarea { font-size: 16px; }
  /* iOSの日付・時刻入力は独自の最小幅を持ち2列からはみ出すため、見た目を通常入力に揃える */
  input[type="date"], input[type="time"] {
    min-width: 0; width: 100%;

  #detail-panel.open { padding: 12px 12px 60px; }

}

/* ===== Toast ===== */
#toasts { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 300; display: flex; flex-direction: column; gap: 8px; align-items: center; }
.toast {
  background: var(--bg3); border: 1px solid var(--border); color: var(--text);
  padding: 10px 18px; border-radius: 8px; font-size: 13px;
  box-shadow: 0 4px 16px rgba(0,0,0,.5); animation: pop .2s;
  max-width: 90vw;
}
.toast.warn { border-color: var(--warn); }
.toast.error { border-color: var(--danger); }
@keyframes pop { from { opacity: 0; transform: translateY(8px); } }

/* ===== FAB & Mobile ===== */
#fab {
  position: fixed; right: 20px; bottom: calc(20px + env(safe-area-inset-bottom));
  width: 54px; height: 54px; border-radius: 50%; border: none;
  background: var(--accent); color: #fff; font-size: 28px; cursor: pointer;
  box-shadow: 0 4px 14px rgba(0,0,0,.5); z-index: 50; display: none;

}
#menu-btn { display: inline-flex; } /* PCでもサイドバー開閉に使う */
#sidebar-bg { display: none; }
@media (min-width: 761px) {

}
@media (max-width: 760px) {

  #memo-list { width: 100%; max-height: 30%; }

}

<body>

<script>
"use strict";
/*========================================================
  CORE: 状態・永続化・ユーティリティ
========================================================*/
const LS_KEY = "gantodo_v1";
const PRIO_LABEL = { high: "高", medium: "中", low: "低", none: "なし" };
const PRIO_COLOR = { high: "var(--prio-high)", medium: "var(--prio-medium)", low: "var(--prio-low)", none: "var(--prio-none)" };
const PROJ_COLORS = ["#4f9cf9","#57ab5a","#e8b93e","#e5534b","#c678dd","#56b6c2","#e69138","#8ab4f8"];

let state = null;
let view = { type: "today" };          // 現在のビュー
let detailTaskId = null;               // 右パネルで開いているタスク
let noteEditing = false;               // タスクメモ欄が編集モードか
let detailExpanded = false;            // 詳細設定（プロジェクト・日付等）を展開しているか
let editingDateField = null;           // 開始日/終了日/開始可能日/納期のうち、フル編集（ネイティブ日付ピッカー）を表示中のもの（それ以外は年を省いたM/D表示）
let editingParent = false;             // 親タスクの検索欄を表示中か
const selectedTaskIds = new Set();     // Ctrl/Cmd+クリックで複数選択中のタスクid（セッション内のみ・非永続）
let ganttZoom = "day";                  // day | week | month
let ganttScrollMemo = null;             // ガントの横スクロール位置（再描画で失わないよう記憶）
let editingMemoId = null;
let memoPreview = false;

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}
// 同名タスクの区別用に表示する短縮ID（内部idの末尾6文字）
function shortId(id) {
  return (id || "").slice(-6);
}
function nowISO() { return new Date().toISOString(); }

function defaultState() {
  return {
    version: 1,
    projects: [],
    sections: [],
    tasks: [],
    memos: [],
    resetAt: null, // 全データリセットの実施時刻（同期時に「自分より新しいリセットが他端末で起きたか」の判定に使う）
    today: { date: todayStr(), manualOrder: null, manualAdded: [], updatedAt: nowISO() },
    settings: { gasUrl: "", gasKey: "", weekStart: 1, sidebarHidden: false, ganttHideDone: false },
  };
}

function loadState() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return defaultState();
    const s = JSON.parse(raw);
    const d = defaultState();
    for (const k of Object.keys(d)) if (s[k] === undefined) s[k] = d[k];
    // 「今日やる」リストは日付が変わったらリセット
    if (s.today.date !== todayStr()) s.today = { date: todayStr(), manualOrder: null, manualAdded: [], updatedAt: nowISO() };
    // ゴミ箱の30日超えタスクを完全削除
    const limit = addDays(todayStr(), -30);
    s.tasks = s.tasks.filter(t => !t.deletedAt || t.deletedAt.slice(0, 10) >= limit);
    s.memos = s.memos.filter(m => !m.deletedAt || m.deletedAt.slice(0, 10) >= limit);
    // サブタスクのプロジェクトを最上位の親に揃える（過去データの補正）
    fixSubtaskProjects(s.tasks);
    return s;
  } catch (e) {
    console.error("loadState failed", e);
    return defaultState();
  }
}

// サブタスクのprojectIdを最上位の親に揃える（読み込み時の補正・CSVインポート後の補正で共用）
function fixSubtaskProjects(tasks) {
  const byId = new Map(tasks.map(t => [t.id, t]));
  for (const t of tasks) {
    if (!t.parentTaskId || !byId.has(t.parentTaskId)) continue;
    let root = t;
    const seen = new Set();
    while (root.parentTaskId && byId.has(root.parentTaskId) && !seen.has(root.id)) {
      seen.add(root.id);
      root = byId.get(root.parentTaskId);
    }
    const pid = root.projectId || null;
    if ((t.projectId || null) !== pid) { t.projectId = pid; t.sectionId = null; t.updatedAt = nowISO(); }
  }
}

function save() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify(state));
    queueSync(); // 同期設定があれば、変更後しばらくして自動同期
  } catch (e) {
    toast("保存に失敗しました: " + e.message, "error");
  }
}

// 通常のsave()より厳格な版: 失敗したら直前の状態に巻き戻す（大容量インポート専用）
function saveOrRevert(beforeJSON) {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify(state));
    return true;
  } catch (e) {
    try { state = JSON.parse(beforeJSON); } catch { /* 復元不能なら現状維持 */ }
    toast("⚠ 保存容量の上限を超えたため反映されませんでした。「メモを要約してインポート」で再度お試しください", "error");
    return false;
  }
}
function commit() { save(); render(); }

/* ---- 日付ユーティリティ（すべて 'YYYY-MM-DD' 文字列で扱う） ---- */
function todayStr() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}
function parseDate(s) {
  const [y, m, d] = s.split("-").map(Number);
  return new Date(y, m - 1, d);
}
function fmtDate(d) {
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}
function addDays(s, n) {
  const d = parseDate(s);
  d.setDate(d.getDate() + n);
  return fmtDate(d);
}
function diffDays(a, b) { // a - b（日数）
  return Math.round((parseDate(a) - parseDate(b)) / 86400000);
}
function fmtDisp(s) { // 表示用 M/D
  if (!s) return "";
  const d = parseDate(s);
  return (d.getMonth() + 1) + "/" + d.getDate();
}
const WEEKDAYS = ["日", "月", "火", "水", "木", "金", "土"];
function fmtDispW(s) {
  if (!s) return "";
  const d = parseDate(s);
  return (d.getMonth() + 1) + "/" + d.getDate() + "(" + WEEKDAYS[d.getDay()] + ")";
}

/* ---- エンティティ取得 ---- */
function getTask(id) { return state.tasks.find(t => t.id === id); }
function getProject(id) { return state.projects.find(p => p.id === id); }
function getSection(id) { return state.sections.find(s => s.id === id); }
function liveTasks() { return state.tasks.filter(t => !t.deletedAt); }
function activeTasks() { return liveTasks().filter(t => t.status === "active"); }
// 削除済み(status:"deleted")・アーカイブ済みを除いた、表示対象のプロジェクト一覧
function visibleProjects() { return state.projects.filter(p => p.status !== "archived" && p.status !== "deleted"); }

/* ---- HTMLエスケープ ---- */
function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

/* ---- IME変換中のEnter判定（変換確定のEnterでタスクを作らないため） ---- */
function isIMEEnter(e) {
  return e.isComposing || e.keyCode === 229;
}

/* ---- 添付ファイル保存（IndexedDB: localStorageの容量制限を回避） ---- */
let idbHandle = null;
function idbOpen() {
  return new Promise((res, rej) => {
    if (idbHandle) return res(idbHandle);
    const rq = indexedDB.open("gantodo_files", 1);
    rq.onupgradeneeded = () => rq.result.createObjectStore("files", { keyPath: "id" });
    rq.onsuccess = () => { idbHandle = rq.result; res(idbHandle); };
    rq.onerror = () => rej(rq.error);
  });
}
async function fileSave(id, blob) {
  const db = await idbOpen();
  return new Promise((res, rej) => {
    const tx = db.transaction("files", "readwrite");
    tx.objectStore("files").put({ id, blob });
    tx.oncomplete = res;
    tx.onerror = () => rej(tx.error);
  });
}
async function fileGet(id) {
  const db = await idbOpen();
  return new Promise((res, rej) => {
    const rq = db.transaction("files").objectStore("files").get(id);
    rq.onsuccess = () => res(rq.result ? rq.result.blob : null);
    rq.onerror = () => rej(rq.error);
  });
}
async function fileDelete(id) {
  const db = await idbOpen();
  return new Promise((res, rej) => {
    const tx = db.transaction("files", "readwrite");
    tx.objectStore("files").delete(id);
    tx.oncomplete = res;
    tx.onerror = () => rej(tx.error);
  });
}

/* ---- 添付ファイルの実体を同期ペイロードに含める（iPhone⇔PC間で画像等を共有するため） ----
   Google Sheets/Apps Script側の負荷・速度を考えて合計サイズに上限を設け、
   超過分は新しいものを優先してスキップする（次回以降の同期で改めて試みる） */
const ATTACHMENT_SYNC_CAP_BYTES = 4 * 1024 * 1024; // base64換算で約4MBまで
async function blobToBase64(blob) {
  const buf = await blob.arrayBuffer();
  const bytes = new Uint8Array(buf);
  let binary = "";
  const chunk = 0x8000;
  for (let i = 0; i < bytes.length; i += chunk) binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
  return btoa(binary);
}
function base64ToBlob(b64, mime) {
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return new Blob([bytes], { type: mime || "application/octet-stream" });
}
// 送信用: 生存タスクの添付を新しい順に集め、上限に収まる分だけbase64化する
async function collectAttachmentFilesForSync() {
  const metas = [];
  for (const t of liveTasks()) for (const a of t.attachments || []) metas.push(a);
  metas.sort((a, b) => (b.createdAt || "").localeCompare(a.createdAt || ""));
  const files = [];
  let total = 0, skipped = 0;
  for (const a of metas) {
    if (total + (a.size || 0) * 1.37 > ATTACHMENT_SYNC_CAP_BYTES) { skipped++; continue; }
    try {
      const blob = await fileGet(a.id);
      if (!blob) continue;
      const data = await blobToBase64(blob);
      files.push({ id: a.id, mime: blob.type, data, createdAt: a.createdAt || nowISO() });
      total += data.length;
    } catch { skipped++; }
  }
  return { files, skipped };
}
// 受信用: ローカルにまだない実体だけIndexedDBへ保存する（内容は不変なので上書きしない）
async function applyIncomingFiles(remoteFiles) {
  if (!remoteFiles || !remoteFiles.length) return;
  for (const f of remoteFiles) {
    try {
      if (await fileGet(f.id)) continue;
      await fileSave(f.id, base64ToBlob(f.data, f.mime));
    } catch { /* 個別の失敗は無視して続行 */ }
  }
}
// 大きい画像は自動で縮小してから保存（最長辺1600px・JPEG化）
async function maybeCompressImage(file) {
  if (!file.type.startsWith("image/") || file.type === "image/gif" || file.size < 300 * 1024) return file;
  try {
    const bmp = await createImageBitmap(file);
    const scale = Math.min(1, 1600 / Math.max(bmp.width, bmp.height));
    const canvas = document.createElement("canvas");
    canvas.width = Math.max(1, Math.round(bmp.width * scale));
    canvas.height = Math.max(1, Math.round(bmp.height * scale));
    canvas.getContext("2d").drawImage(bmp, 0, 0, canvas.width, canvas.height);
    const blob = await new Promise(r => canvas.toBlob(r, "image/jpeg", 0.82));
    return blob && blob.size < file.size ? blob : file;
  } catch { return file; }
}
async function attachFiles(t, files) {
  if (!files.length) return;
  try {
    for (const f of files) {
      const blob = await maybeCompressImage(f);
      const id = uid();
      await fileSave(id, blob);
      t.attachments = [...(t.attachments || []), {
        id,
        name: f.name || ("貼り付け画像-" + todayStr() + (blob.type === "image/jpeg" ? ".jpg" : ".png")),
        type: blob.type || f.type,
        size: blob.size,
        createdAt: nowISO(),
      }];
    }
    touch(t);
    commit();
    toast(files.length + "件添付しました");
  } catch (e) {
    toast("添付に失敗しました: " + e.message, "error");
  }
}

/* ---- トースト ---- */
function toast(msg, kind) {
  const box = document.getElementById("toasts");
  while (box.children.length >= 3) box.firstChild.remove(); // 溜まりすぎ防止
  const el = document.createElement("div");
  el.className = "toast" + (kind ? " " + kind : "");
  el.textContent = msg;
  box.appendChild(el);
  setTimeout(() => el.remove(), 3200);
}
/*========================================================
  LOGIC: 依存関係・着手可否・自動優先スコア
========================================================*/
// このタスクが（未完了の先行タスクにより）ブロックされているか
function isBlocked(task) {
  return (task.blockedBy || []).some(id => {
    const p = getTask(id);
    return p && !p.deletedAt && p.status !== "completed";
  });
}
// 開始可能日がまだ来ていない（待機中）か
function isWaiting(task) {
  return !!task.earliestStartDate && todayStr() < task.earliestStartDate;
}
// 今日着手できるか（仕様 11.6 canStart）
function canStart(task) {
  return !isBlocked(task) && !isWaiting(task);
}
// 循環依存チェック: taskId の blockedBy に depId を追加すると循環するか
function wouldCycle(taskId, depId) {
  if (taskId === depId) return true;
  const visited = new Set();
  const stack = [depId]; // depId の先行を辿って taskId に到達したら循環
  while (stack.length) {
    const cur = stack.pop();
    if (cur === taskId) return true;
    if (visited.has(cur)) continue;
    visited.add(cur);
    const t = getTask(cur);
    if (t) for (const b of t.blockedBy || []) stack.push(b);
  }
  return false;
}
// 後続タスク（このタスクの完了を待つタスク）の一覧
function successorsOf(taskId) {
  return activeTasks().filter(t => (t.blockedBy || []).includes(taskId));
}
// 後続タスク総数（再帰・重複除外）: 仕様 12.2 のスコア用
function countAllSuccessors(taskId) {
  const seen = new Set();
  const stack = [taskId];
  while (stack.length) {
    const cur = stack.pop();
    for (const s of successorsOf(cur)) {
      if (!seen.has(s.id)) { seen.add(s.id); stack.push(s.id); }
    }
  }
  return seen.size;
}

// 「今日やる理由」があるか（仕様 12.1）
function hasTodayReason(t) {
  const today = todayStr();
  if (t.dueDate && t.dueDate <= today) return true;
  if (t.startDate && t.startDate <= today && (!t.endDate || today <= t.endDate)) return true;
  if (state.today.manualAdded.includes(t.id)) return true;
  return false;
}
// 「今日すること」の表示対象（人に任せて返信待ちのタスクは一時的に外し、専用の置き場だけに表示する）
function todayTasks() {
  return activeTasks().filter(t => canStart(t) && hasTodayReason(t) && !t.waitingOnOther);
}
// 人に任せた（返信待ち）状態の切り替え
function toggleDelegated(id) {
  const t = getTask(id);
  if (!t) return;
  t.waitingOnOther = !t.waitingOnOther;
  touch(t);
  commit();
  toast(t.waitingOnOther ? "🤝 人に任せた置き場に移動しました" : "🔓 通常のタスクに戻しました");
}

// 自動優先スコア（仕様 12.2）
// 時間指定タスクは並び順で別扱い（00:00〜18:00は最優先・18:00〜24:00は最後）のため、
// スコア計算そのものには時間指定の加点を含めない（time.js側のtimeOf()で判定・振り分けする）
// 時間指定の加点: 00:00〜12:00は15点・12:00より後（〜24:00）は5点（時間指定がなければ0点）
const SCORE_W = { due: 40, priority: 40, successor: 25, timeAM: 15, timePM: 5 };
// 今日の時間指定（終了予定日の時刻）。なければnull
function todayTimeOf(t) {
  const today = todayStr();
  if (t.endDate === today && t.endTime) return t.endTime;
  return null;
}
function timeBonusOf(t) {
  const time = todayTimeOf(t);
  if (time === null) return 0;
  return time <= "12:00" ? SCORE_W.timeAM : SCORE_W.timePM;
}
function autoPriorityScore(t) {
  const today = todayStr();
  const daysToDue = t.dueDate ? diffDays(t.dueDate, today) : 999;
  const dueScore = daysToDue <= 0 ? 1.0 : Math.max(0, 1 - daysToDue / 14);
  const prioScore = { high: 1.0, medium: 0.6, low: 0.3, none: 0 }[t.priority] || 0;
  const succScore = Math.min(1, countAllSuccessors(t.id) / 5);
  return SCORE_W.due * dueScore + SCORE_W.priority * prioScore + SCORE_W.successor * succScore + timeBonusOf(t);
}
function scoreBreakdown(t) {
  const today = todayStr();
  const daysToDue = t.dueDate ? diffDays(t.dueDate, today) : 999;
  const dueScore = daysToDue <= 0 ? 1.0 : Math.max(0, 1 - daysToDue / 14);
  const prioScore = { high: 1.0, medium: 0.6, low: 0.3, none: 0 }[t.priority] || 0;
  const succ = countAllSuccessors(t.id);
  const parts = [
    `期日: ${(SCORE_W.due * dueScore).toFixed(0)}`,
    `優先度: ${(SCORE_W.priority * prioScore).toFixed(0)}`,
    `後続${succ}件: ${(SCORE_W.successor * Math.min(1, succ / 5)).toFixed(0)}`,
  ];
  const tb = timeBonusOf(t);
  if (tb) parts.push(`時間指定: ${tb}`);
  return parts.join(" / ");
}
// 自動優先順（スコア降順 → 期日 → 優先度でタイブレーク）
function autoSortToday(tasks) {
  const prioRank = { high: 0, medium: 1, low: 2, none: 3 };
  return tasks.slice().sort((a, b) => {
    const sa = autoPriorityScore(a), sb = autoPriorityScore(b);
    if (sb !== sa) return sb - sa;
    // スコアが同点の場合は、終了日の時間指定が早い時間順（時間指定なしは後ろ）を優先条件にする
    const ta = todayTimeOf(a) || "99:99", tb = todayTimeOf(b) || "99:99";
    if (ta !== tb) return ta < tb ? -1 : 1;
    const da = a.dueDate || "9999-12-31", db = b.dueDate || "9999-12-31";
    if (da !== db) return da < db ? -1 : 1;
    return prioRank[a.priority] - prioRank[b.priority];
  });
}

/*========================================================
  繰り返し（仕様3.6）: repeat = { unit, interval, byDay?, from }
  unit: 'day'|'week'|'month'|'year' / from: 'due'（期日基準）|'completion'（完了日基準）
========================================================*/
const WEEKDAYS_SHORT = ["日", "月", "火", "水", "木", "金", "土"];

function repeatLabel(rep) {
  if (!rep || !rep.unit) return "";
  let label;
  if (rep.unit === "week" && rep.byDay && rep.byDay.length) {
    label = "毎週" + rep.byDay.map(d => WEEKDAYS_SHORT[d]).join("");
  } else {
    const uLabel = { day: "日", week: "週", month: "ヶ月", year: "年" }[rep.unit];
    label = rep.interval > 1 ? `${rep.interval}${uLabel}ごと` : `毎${rep.unit === "month" ? "月" : uLabel}`;
  }
  if (rep.until) label += `（〜${fmtDisp(rep.until)}まで）`;
  return label;
}

// 週の開始日（設定のweekStart基準）に揃えた日付を返す（「n週ごと」の週ブロック判定に使用）
function weekBlockStart(dateStr) {
  const wStart = state.settings.weekStart === 1 ? 1 : 0;
  const day = parseDate(dateStr).getDay();
  return addDays(dateStr, -((day - wStart + 7) % 7));
}
// 指定日以降で次に繰り返す日付を計算
function nextRepeatDate(base, rep) {
  if (!rep || !rep.unit) return base;
  if (rep.unit === "day") return addDays(base, rep.interval);
  if (rep.unit === "week") {
    if (rep.byDay && rep.byDay.length) {
      // 「n週ごと」は、baseと同じ週ブロック内なら間隔を無視して次の曜日へ（同じ週内の複数曜日を消化）、
      // 週ブロックが変わる場合はinterval週ごとの週ブロックだけを対象にする
      const interval = Math.max(1, rep.interval || 1);
      const baseBlock = weekBlockStart(base);
      let d = addDays(base, 1);
      for (let i = 0; i < interval * 7 + 7; i++) {
        const weeksBetween = diffDays(weekBlockStart(d), baseBlock) / 7;
        if (weeksBetween % interval === 0 && rep.byDay.includes(parseDate(d).getDay())) return d;
        d = addDays(d, 1);
      }
    }
    return addDays(base, 7 * rep.interval);
  }
  if (rep.unit === "month") {
    const dt = parseDate(base);
    dt.setMonth(dt.getMonth() + rep.interval);
    return fmtDate(dt);
  }
  if (rep.unit === "year") {
    const dt = parseDate(base);
    dt.setFullYear(dt.getFullYear() + rep.interval);
    return fmtDate(dt);
  }
  return base;
}

// 繰り返しタスクの完了操作: 次回の日付へ全日付フィールドをまとめてずらし、未完了に戻す。
// 終了日（repeat.until）を過ぎる場合は繰り返しを止め、通常の完了として終わらせる。
// 戻り値: true=次回へ進んだ / false=終了日を過ぎたため通常完了で終わった
function rollTaskForward(t) {
  const rep = t.repeat;
  const today = todayStr();
  const anchor = t.dueDate || t.startDate || today;
  const base = rep.from === "completion" ? today : anchor;
  const next = nextRepeatDate(base, rep);
  if (rep.until && next > rep.until) {
    t.status = "completed";
    t.completedAt = nowISO();
    t.progress = 100;
    touch(t);
    return false;
  }
  const delta = diffDays(next, anchor); // due基準/completion基準どちらでも同じ式でズレ量を算出できる
  if (t.dueDate) t.dueDate = addDays(t.dueDate, delta);
  if (t.startDate) t.startDate = addDays(t.startDate, delta);
  if (t.endDate) t.endDate = addDays(t.endDate, delta);
  if (t.earliestStartDate) t.earliestStartDate = addDays(t.earliestStartDate, delta);
  if (!t.dueDate && !t.startDate) t.dueDate = next;
  t.status = "active";
  t.completedAt = null;
  t.progress = 0;
  touch(t);
  // 新しい回として、サブタスクの完了状態もリセット
  const resetKids = pid => {
    for (const k of state.tasks.filter(x => x.parentTaskId === pid && !x.deletedAt)) {
      k.status = "active"; k.completedAt = null; k.progress = 0;
      touch(k);
      resetKids(k.id);
    }
  };
  resetKids(t.id);
  return true;
}

/*========================================================
  タスク操作
========================================================*/
// 新規タスクは常にリストの先頭に来るよう、既存タスクの最小sortOrderより小さい値を割り当てる
function nextTopSortOrder() {
  let min = 0;
  for (const x of state.tasks) if (x.sortOrder < min) min = x.sortOrder;
  return min - 1;
}
function newTask(fields) {
  const t = {
    id: uid(), title: "", note: "", status: "active", progress: 0,
    projectId: null, sectionId: null, parentTaskId: null,
    priority: "none", tags: [], assignee: "", category: "",
    startDate: null, endDate: null, endTime: null, dueDate: null, earliestStartDate: null,
    blockedBy: [], isMilestone: false, waitingOnOther: false, nextAction: null, repeat: null,
    attachments: [], collapsed: false, gcalEventId: null,
    sortOrder: nextTopSortOrder(),
    createdAt: nowISO(), updatedAt: nowISO(), completedAt: null, deletedAt: null,
    ...fields,
  };
  state.tasks.push(t);
  maybeQueueCalendarSync(t);
  return t;
}
function touch(t) {
  t.updatedAt = nowISO();
  maybeQueueCalendarSync(t);
}
// カレンダー連携の対象: 終了日時刻(endDate+endTime)がある（時間指定の予定）、
// または開始日・終了日だけがある(endTime無し。終日の予定)、またはカレンダーに連携済みのタスク。
// （無関係な編集のたびに毎回GASへ問い合わせるのを避けるための絞り込み）。
// newTask()・TickTickインポートなどtouch()を経由しない新規作成パスからも呼ぶ。
function isCalendarEligible(t) {
  return !t.deletedAt && !!t.endDate && (!!t.endTime || !!t.startDate);
}
function maybeQueueCalendarSync(t) {
  if (isCalendarEligible(t) || t.gcalEventId) queueCalendarSync(t.id);
}

/* ---- Googleカレンダー連携: 終了日時刻(endDate+endTime)があればその時刻から1時間の予定、
   時刻指定が無く開始日・終了日だけあれば開始日〜終了日の終日の予定として自動反映 ----
   GAS側(gas/Code.gs)のgcalUpsert/gcalDeleteアクションを使う。既存の同期用エンドポイントを流用するため
   別途OAuth設定は不要（GASが「自分として実行」する権限でカレンダーを操作する） */
let calendarSyncTimer = null;
const pendingCalendarSyncIds = new Set();
function queueCalendarSync(taskId) {
  if (!state.settings.gasUrl) return;
  pendingCalendarSyncIds.add(taskId);
  clearTimeout(calendarSyncTimer);
  calendarSyncTimer = setTimeout(flushCalendarSync, 3000); // 数秒だけデバウンス（メインの15秒同期より短く「リアルタイム」寄りに）
}
async function flushCalendarSync() {
  const ids = [...pendingCalendarSyncIds];
  pendingCalendarSyncIds.clear();
  for (const id of ids) {
    const t = getTask(id);
    if (t) await syncTaskToCalendar(t);
  }
}
async function syncTaskToCalendar(t) {
  const { gasUrl, gasKey } = state.settings;
  if (!gasUrl) return;
  try {
    if (!isCalendarEligible(t)) {
      // 予定が不要になった（削除された・終了日時刻/終了日がなくなった）→ 既存の連携があれば解除
      if (t.gcalEventId) {
        const eventId = t.gcalEventId;
        t.gcalEventId = null;
        t.updatedAt = nowISO();
        save();
        await fetch(gasUrl, {
          method: "POST", headers: { "Content-Type": "text/plain" },
          body: JSON.stringify({ key: gasKey, action: "gcalDelete", eventId }),
        });
      }
      return;
    }
    const body = t.endTime
      ? { key: gasKey, action: "gcalUpsert", eventId: t.gcalEventId || null, title: t.title,
          startISO: `${t.endDate}T${t.endTime}:00+09:00`, durationMinutes: 60 } // GAS実行環境のタイムゾーンに依存しないよう明示的にJSTを指定
      : { key: gasKey, action: "gcalUpsert", eventId: t.gcalEventId || null, title: t.title,
          allDay: true, startDate: t.startDate, endDate: t.endDate };
    const res = await fetch(gasUrl, {
      method: "POST", headers: { "Content-Type": "text/plain" },
      body: JSON.stringify(body),
    });
    const json = await res.json();
    if (json.eventId && json.eventId !== t.gcalEventId) {
      t.gcalEventId = json.eventId;
      t.updatedAt = nowISO();
      save();
    }
  } catch (e) {
    // 通信エラーは静かに無視（次にこのタスクがtouchされた時に再試行される）
  }
}

// taskId が ancestorId の子孫かどうか
function isDescendantOf(taskId, ancestorId) {
  let cur = getTask(taskId);
  const seen = new Set();
  while (cur && cur.parentTaskId && !seen.has(cur.id)) {
    seen.add(cur.id);
    if (cur.parentTaskId === ancestorId) return true;
    cur = getTask(cur.parentTaskId);
  }
  return false;
}
function taskDepth(id) {
  let d = 0, cur = getTask(id);
  const seen = new Set();
  while (cur && cur.parentTaskId && !seen.has(cur.id)) { seen.add(cur.id); d++; cur = getTask(cur.parentTaskId); }
  return d;
}
function subtreeHeight(id) {
  const kids = state.tasks.filter(x => x.parentTaskId === id && !x.deletedAt);
  return kids.length ? 1 + Math.max(...kids.map(k => subtreeHeight(k.id))) : 0;
}

// D&Dでのタスク移動: mode = "into"(サブタスク化) | "before" | "after"(並び替え・親の付け替え)
function handleTaskDrop(dragId, targetId, mode) {
  if (!dragId || dragId === targetId) return;
  const drag = getTask(dragId), target = getTask(targetId);
  if (!drag || !target) return;
  if (dragId === targetId || isDescendantOf(targetId, dragId)) {
    toast("自分自身やそのサブタスクの下へは移動できません", "warn");
    return;
  }
  if (mode === "into") {
    if (target.parentTaskId === dragId) return;
    if (taskDepth(targetId) + 1 + subtreeHeight(dragId) > 5) {
      toast("サブタスクは5階層までです", "warn");
      return;
    }
    drag.parentTaskId = targetId;
    drag.projectId = target.projectId || null;
    drag.sectionId = target.sectionId || null;
    const sibs = state.tasks.filter(x => x.parentTaskId === targetId && !x.deletedAt && x.id !== dragId);
    drag.sortOrder = sibs.length ? Math.max(...sibs.map(s => s.sortOrder)) + 1 : 0;
    target.collapsed = false; // 入れた直後に見えるように
    cascadeProject(dragId, drag.projectId);
    touch(drag);
    commit();
    toast(`「${drag.title}」を「${target.title}」のサブタスクにしました`);
  } else {
    // before/after: targetの兄弟として挿入（親・プロジェクト・セクションを引き継ぐ）
    drag.parentTaskId = target.parentTaskId || null;
    drag.projectId = target.projectId || null;
    drag.sectionId = target.sectionId || null;
    cascadeProject(dragId, drag.projectId);
    const sibs = state.tasks.filter(x =>
      !x.deletedAt && x.id !== dragId &&
      (x.parentTaskId || null) === (target.parentTaskId || null) &&
      (x.projectId || null) === (target.projectId || null) &&
      (x.sectionId || null) === (target.sectionId || null)
    ).sort((a, b) => a.sortOrder - b.sortOrder);
    const idx = sibs.findIndex(x => x.id === targetId);
    sibs.splice(mode === "before" ? idx : idx + 1, 0, drag);
    // 並び替えで位置がずれる兄弟タスクも同期対象にするため、sortOrderが変わったものはすべてtouchする
    sibs.forEach((x, i) => { if (x.sortOrder !== i) touch(x); x.sortOrder = i; });
    commit();
  }
}

// dataTransferからドラッグ中のタスクid一覧を取り出す（複数選択中のドラッグはJSON配列、それ以外は単一idの配列）
function parseDragIds(e) {
  const raw = e.dataTransfer.getData("text/plain");
  try {
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : [raw];
  } catch {
    return raw ? [raw] : [];
  }
}
// 複数選択中のタスクをまとめてD&D移動: mode = "into"(まとめてサブタスク化) | "before" | "after"
// 単一ドラッグ時のhandleTaskDrop()とは別関数にして、既存の単一移動の挙動・メッセージは変えない
function handleTaskDropMulti(dragIds, targetId, mode) {
  const target = getTask(targetId);
  if (!target) return;
  let skipped = 0;
  const valid = [];
  for (const id of new Set(dragIds)) {
    if (id === targetId) continue;
    const t = getTask(id);
    if (!t || isDescendantOf(targetId, id)) { skipped++; continue; }
    valid.push(t);
  }
  if (!valid.length) {
    if (skipped) toast("自分自身やそのサブタスクの下へは移動できません", "warn");
    return;
  }
  valid.sort((a, b) => a.sortOrder - b.sortOrder); // 元々の相互順序を維持したまま移動する

  if (mode === "into") {
    const maxHeight = Math.max(...valid.map(t => subtreeHeight(t.id)));
    if (taskDepth(targetId) + 1 + maxHeight > 5) {
      toast("サブタスクは5階層までです", "warn");
      return;
    }
    const dragIdSet = new Set(valid.map(t => t.id));
    const sibs = state.tasks.filter(x => x.parentTaskId === targetId && !x.deletedAt && !dragIdSet.has(x.id));
    let nextOrder = sibs.length ? Math.max(...sibs.map(s => s.sortOrder)) + 1 : 0;
    for (const t of valid) {
      t.parentTaskId = targetId;
      t.projectId = target.projectId || null;
      t.sectionId = target.sectionId || null;
      t.sortOrder = nextOrder++;
      cascadeProject(t.id, t.projectId);
      touch(t);
    }
    target.collapsed = false;
    selectedTaskIds.clear();
    commit();
    toast(`${valid.length}件を「${target.title}」のサブタスクにしました`);
  } else {
    const dragIdSet = new Set(valid.map(t => t.id));
    const sibs = state.tasks.filter(x =>
      !x.deletedAt && !dragIdSet.has(x.id) &&
      (x.parentTaskId || null) === (target.parentTaskId || null) &&
      (x.projectId || null) === (target.projectId || null) &&
      (x.sectionId || null) === (target.sectionId || null)
    ).sort((a, b) => a.sortOrder - b.sortOrder);
    const idx = sibs.findIndex(x => x.id === targetId);
    sibs.splice(mode === "before" ? idx : idx + 1, 0, ...valid);
    for (const t of valid) {
      t.parentTaskId = target.parentTaskId || null;
      t.projectId = target.projectId || null;
      t.sectionId = target.sectionId || null;
      cascadeProject(t.id, t.projectId);
      touch(t);
    }
    // 並び替えで位置がずれる兄弟タスクも同期対象にするため、sortOrderが変わったものはすべてtouchする
    sibs.forEach((x, i) => { if (x.sortOrder !== i) touch(x); x.sortOrder = i; });
    selectedTaskIds.clear();
    commit();
    toast(`${valid.length}件をまとめて移動しました`);
  }
}

// 詳細パネルの「親タスクを検索して設定」から使う、D&Dの"into"モードと同等の付け替え処理
function setTaskParent(taskId, newParentId) {
  const t = getTask(taskId), parent = getTask(newParentId);
  if (!t || !parent || taskId === newParentId) return;
  if (isDescendantOf(newParentId, taskId)) {
    toast("自分自身やそのサブタスクを親にはできません", "warn");
    return;
  }
  if (taskDepth(newParentId) + 1 + subtreeHeight(taskId) > 5) {
    toast("サブタスクは5階層までです", "warn");
    return;
  }
  t.parentTaskId = newParentId;
  t.projectId = parent.projectId || null;
  t.sectionId = parent.sectionId || null;
  const sibs = state.tasks.filter(x => x.parentTaskId === newParentId && !x.deletedAt && x.id !== taskId);
  t.sortOrder = sibs.length ? Math.max(...sibs.map(s => s.sortOrder)) + 1 : 0;
  parent.collapsed = false;
  cascadeProject(taskId, t.projectId);
  touch(t);
  commit();
  toast(`「${t.title}」を「${parent.title}」のサブタスクにしました`);
}
function clearTaskParent(taskId) {
  const t = getTask(taskId);
  if (!t || !t.parentTaskId) return;
  const title = t.title;
  t.parentTaskId = null;
  touch(t);
  commit();
  toast(`「${title}」を親タスクから独立させました`);
}

// プロジェクト変更を全子孫タスクへ引き継ぐ
function cascadeProject(taskId, projectId) {
  for (const c of state.tasks.filter(x => x.parentTaskId === taskId && !x.deletedAt)) {
    c.projectId = projectId;
    c.sectionId = null;
    touch(c);
    cascadeProject(c.id, projectId);
  }
}

function toggleComplete(id) {
  const t = getTask(id);
  if (!t) return;
  if (t.status === "completed") {
    t.status = "active"; t.completedAt = null;
    if (t.progress === 100) t.progress = 0;
    touch(t);
    commit();
    return;
  }
  if (t.repeat && t.repeat.unit) {
    const continued = rollTaskForward(t);
    commit();
    if (continued) {
      const nextLabel = t.dueDate || t.startDate;
      toast(nextLabel ? `🔁 完了！次回は ${fmtDispW(nextLabel)} です` : "🔁 完了！次回の予定に更新しました");
    } else {
      toast("✔ 完了しました（繰り返しの終了日を過ぎたため、これで終了です）");
    }
    return;
  }
  t.status = "completed"; t.completedAt = nowISO(); t.progress = 100;
  // ブロックが外れた後続を通知
  const freed = successorsOf(id).filter(s => !isBlocked(s));
  if (freed.length) toast(`✔ 完了。後続 ${freed.map(f => "「" + f.title + "」").join("・")} が着手可能になりました`);
  touch(t);
  commit();
}
function deleteTask(id) {
  const t = getTask(id);
  if (!t) return;
  // サブタスクも全階層まとめてゴミ箱へ
  const stack = [id];
  while (stack.length) {
    const cur = getTask(stack.pop());
    if (!cur || cur.deletedAt) continue;
    cur.deletedAt = nowISO(); touch(cur);
    for (const c of state.tasks.filter(x => x.parentTaskId === cur.id && !x.deletedAt)) stack.push(c.id);
  }
  commit();
}
function restoreTask(id) {
  const t = getTask(id);
  if (!t) return;
  t.deletedAt = null; touch(t);
  commit();
}
// 先送り: 期日・実施期間を n 日ずらす
function postponeTask(id, n) {
  const t = getTask(id);
  if (!t) return;
  if (t.dueDate) t.dueDate = addDays(t.dueDate, n);
  if (t.startDate && t.endDate) {
    // 実施期間はまるごとシフト（期間内が「今日やる理由」になっている場合に有効）
    if (t.startDate <= todayStr()) { t.startDate = addDays(todayStr(), n); }
    if (t.endDate < t.startDate) t.endDate = t.startDate;
  }
  state.today.manualAdded = state.today.manualAdded.filter(x => x !== id);
  state.today.updatedAt = nowISO();
  touch(t);
  commit();
  toast(n === 1 ? "明日へ先送りしました" : n + "日先へ送りました");
}

function setView(v) {

  view = v;

function smartCounts() {
  const today = todayStr();
  const act = activeTasks();
  return {
    today: todayTasks().length,
    inbox: act.filter(t => !t.projectId && !t.parentTaskId).length,
    overdue: act.filter(t => t.dueDate && t.dueDate < today).length,

function renderSidebar() {
  const c = smartCounts();
  const items = [
    { key: "today", icon: "🔥", label: "今日すること", cnt: c.today, v: { type: "today" } },
    { key: "dashboard", icon: "📊", label: "ダッシュボード", cnt: null, v: { type: "dashboard" } },
    { key: "gantt", icon: "📈", label: "ガント", cnt: null, v: { type: "gantt", id: "__all" } },
    { key: "smart-today", icon: "📅", label: "Today", cnt: null, v: { type: "smart", smart: "today" } },
    { key: "smart-week", icon: "🗓", label: "今週", cnt: null, v: { type: "smart", smart: "week" } },
    { key: "inbox", icon: "📥", label: "Inbox", cnt: c.inbox, v: { type: "smart", smart: "inbox" } },
    { key: "overdue", icon: "⚠️", label: "期限超過", cnt: c.overdue, alert: c.overdue > 0, v: { type: "smart", smart: "overdue" } },
    { key: "all", icon: "📋", label: "すべて", cnt: null, v: { type: "smart", smart: "all" } },
  ];
  const nav = document.getElementById("nav-smart");
  nav.innerHTML = items.map(it => {
    const active = JSON.stringify(view) === JSON.stringify(it.v);
    return `<div class="nav-item ${active ? "active" : ""}" data-nav="${it.key}" data-testid="nav-${it.key}">
      <span>${it.icon}</span><span>${it.label}</span>
      ${it.cnt !== null && it.cnt > 0 ? `<span class="cnt ${it.alert ? "alert" : ""}">${it.cnt}</span>` : ""}
    </div>`;
  }).join("");
  nav.querySelectorAll(".nav-item").forEach((el, i) => {
    el.onclick = () => setView(items[i].v);
  });

  // プロジェクト一覧（sortOrder順・ドラッグで並び替え可能）
  const projNav = document.getElementById("nav-projects");
  const projs = visibleProjects().sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0));
  projNav.innerHTML = projs.map(p => {
    const act = activeTasks().filter(t => t.projectId === p.id);
    const od = act.filter(t => t.dueDate && t.dueDate < todayStr()).length;
    const active = (view.type === "project" || view.type === "gantt") && view.id === p.id;
    return `<div class="nav-item ${active ? "active" : ""}" draggable="true" data-proj="${p.id}" data-testid="nav-proj-${esc(p.name)}">
      <span class="proj-dot" style="background:${p.color}"></span>
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.name)}</span>
      ${od > 0 ? `<span class="cnt alert">${od}</span>` : act.length ? `<span class="cnt">${act.length}</span>` : ""}
    </div>`;
  }).join("") || `<div style="color:var(--text-faint);font-size:12px;padding:4px 10px">まだありません</div>`;
  projNav.querySelectorAll(".nav-item").forEach(el => {
    el.onclick = () => setView({ type: "project", id: el.dataset.proj });
    // ドラッグ＆ドロップで並び替え（上半分にドロップ=前へ・下半分=後ろへ）
    el.addEventListener("dragstart", e => {
      e.dataTransfer.setData("text/plain", el.dataset.proj);
      e.dataTransfer.effectAllowed = "move";
    });
    const clearMarks = () => el.classList.remove("drop-before", "drop-after");
    el.addEventListener("dragover", e => {
      e.preventDefault();
      const rect = el.getBoundingClientRect();
      clearMarks();
      el.classList.add(e.clientY - rect.top < rect.height / 2 ? "drop-before" : "drop-after");
    });
    el.addEventListener("dragleave", clearMarks);
    el.addEventListener("drop", e => {
      e.preventDefault();
      const mode = el.classList.contains("drop-before") ? "before" : "after";
      clearMarks();
      const dragId = e.dataTransfer.getData("text/plain");
      if (!dragId || dragId === el.dataset.proj) return;
      const ids = projs.map(x => x.id).filter(x => x !== dragId);
      let idx = ids.indexOf(el.dataset.proj);
      if (mode === "after") idx += 1;
      ids.splice(idx, 0, dragId);
      // 並び替えで位置がずれるプロジェクトも同期対象にするため、sortOrderが変わったものはすべてtouchする
      ids.forEach((id, i) => {
        const proj = getProject(id);
        if (!proj) return;
        if (proj.sortOrder !== i) touch(proj);
        proj.sortOrder = i;
      });
      commit();
    });
  });

  // その他
  const misc = document.getElementById("nav-misc");
  const miscItems = [
    { key: "memos", icon: "📝", label: "メモ", v: { type: "memos" }, cnt: state.memos.filter(m => !m.deletedAt).length || null },
    { key: "trash", icon: "🗑", label: "ゴミ箱", v: { type: "trash" }, cnt: c.trash || null },
    { key: "settings", icon: "⚙️", label: "設定・データ", v: { type: "settings" }, cnt: null },
  ];
  misc.innerHTML = miscItems.map(it => {
    const active = view.type === it.v.type;
    return `<div class="nav-item ${active ? "active" : ""}" data-testid="nav-${it.key}">
      <span>${it.icon}</span><span>${it.label}</span>
      ${it.cnt ? `<span class="cnt">${it.cnt}</span>` : ""}
    </div>`;
  }).join("");
  misc.querySelectorAll(".nav-item").forEach((el, i) => {
    el.onclick = () => setView(miscItems[i].v);
  });
}

// 複数選択中に画面下部へ出す「一括編集」バー

/*========================================================
  TASK LIST: 行の生成・プロジェクトビュー・スマートリスト
========================================================*/
// タスク1行のDOMを生成
function taskRowEl(t, opts = {}) {
  const row = document.createElement("div");
  const blocked = isBlocked(t), waiting = isWaiting(t);
  row.className = "task-row prio-" + t.priority
    + (t.status === "completed" ? " done" : "")
    + (blocked || waiting ? " blocked" : "")
    + (selectedTaskIds.has(t.id) ? " selected" : "");
  row.dataset.taskId = t.id;
  row.setAttribute("data-testid", "task-row");

  const badges = [];
  const today = todayStr();
  if (t.dueDate) {
    const od = t.status === "active" && t.dueDate < today;
    badges.push(`<span class="badge ${od ? "overdue" : "due"}">${t.isMilestone ? "◆" : "納期"} ${fmtDispW(t.dueDate)}${od ? " 超過" + diffDays(today, t.dueDate) + "日" : ""}</span>`);
  }
  if (t.startDate || t.endDate) badges.push(`<span class="badge">期間 ${fmtDisp(t.startDate)}〜${fmtDisp(t.endDate)}${t.endTime ? " " + t.endTime : ""}</span>`);
  if (t.waitingOnOther) badges.push(`<span class="badge waiting">🤝 人に任せ中</span>`);
  if (blocked) {
    const names = (t.blockedBy || []).map(id => getTask(id)).filter(p => p && !p.deletedAt && p.status !== "completed").map(p => p.title);
    badges.push(`<span class="badge blocked">🔒 ブロック中: ${esc(names.join(", "))}</span>`);
  } else if (waiting) {
    badges.push(`<span class="badge waiting">⏳ ${fmtDisp(t.earliestStartDate)}から着手可</span>`);
  }
  if (t.nextAction && t.nextAction.what) {
    badges.push(`<span class="badge ready">▶ ${esc(t.nextAction.what)}</span>`);
  }
  if (t.nextAction && t.nextAction.status) {
    badges.push(`<span class="badge">${esc(t.nextAction.status)}</span>`);
  }
  if (t.repeat && t.repeat.unit) badges.push(`<span class="badge">🔁 ${esc(repeatLabel(t.repeat))}</span>`);
  for (const tag of t.tags || []) badges.push(`<span class="badge tag">#${esc(tag)}</span>`);
  const kids = state.tasks.filter(x => x.parentTaskId === t.id && !x.deletedAt);
  if (kids.length) {
    const done = kids.filter(k => k.status === "completed").length;
    badges.push(`<span class="badge">☑ ${done}/${kids.length}</span>`);
  }
  if ((t.attachments || []).length) badges.push(`<span class="badge">📎 ${t.attachments.length}</span>`);
  if (opts.showProject && t.projectId) {
    const p = getProject(t.projectId);
    if (p) badges.push(`<span class="badge" style="color:${p.color}">${esc(p.name)}</span>`);
  }

  // ツリー表示時: サブタスクの折りたたみトグル（子なしはスペーサーで整列）
  const tw = opts.tree
    ? (kids.length
      ? `<button class="tw ${t.collapsed ? "collapsed" : ""}" data-testid="tree-toggle" title="サブタスクを開閉">▼</button>`
      : `<span class="tw-sp"></span>`)
    : "";

  row.innerHTML = `${tw}
    <button class="task-check p-${t.priority} ${t.status === "completed" ? "checked" : ""}" data-testid="task-check" aria-label="完了">✓</button>
    <div class="t-main">
      <div class="t-title">${esc(t.title)}</div>
      ${badges.length ? `<div class="t-badges">${badges.join("")}</div>` : ""}
    </div>
    ${t.progress > 0 && t.status === "active" ? `<div class="t-prog">${t.progress}%</div>` : ""}
  `;
  row.querySelector(".task-check").onclick = (e) => { e.stopPropagation(); toggleComplete(t.id); };
  const twBtn = row.querySelector("[data-testid=tree-toggle]");
  if (twBtn) twBtn.onclick = e => { e.stopPropagation(); t.collapsed = !t.collapsed; touch(t); commit(); };

  // D&D: 並び替え＆サブタスク化（上端=前へ / 下端=後ろへ / 中央=サブタスクに）
  if (opts.dnd) {
    row.draggable = true;
    const clearMarks = () => row.classList.remove("drop-before", "drop-after", "drop-into");
    row.addEventListener("dragstart", e => {
      e.stopPropagation();
      // 複数選択中の行をドラッグしたら、選択している全タスクをまとめて運ぶ
      const ids = selectedTaskIds.has(t.id) && selectedTaskIds.size > 1 ? [...selectedTaskIds] : [t.id];
      e.dataTransfer.setData("text/plain", JSON.stringify(ids));
      e.dataTransfer.effectAllowed = "move";
    });
    row.addEventListener("dragover", e => {
      e.preventDefault();
      e.stopPropagation();
      const rect = row.getBoundingClientRect();
      const y = e.clientY - rect.top;
      clearMarks();
      if (y < rect.height * 0.28) row.classList.add("drop-before");
      else if (y > rect.height * 0.72) row.classList.add("drop-after");
      else row.classList.add("drop-into");
    });
    row.addEventListener("dragleave", clearMarks);
    row.addEventListener("drop", e => {
      e.preventDefault();
      e.stopPropagation();
      const mode = row.classList.contains("drop-before") ? "before"
        : row.classList.contains("drop-after") ? "after" : "into";
      clearMarks();
      const ids = parseDragIds(e);
      if (ids.length > 1) handleTaskDropMulti(ids, t.id, mode);
      else handleTaskDrop(ids[0], t.id, mode);
    });
  }

  row.onclick = e => {
    if (e.ctrlKey || e.metaKey) {
      e.preventDefault();
      if (selectedTaskIds.has(t.id)) selectedTaskIds.delete(t.id);
      else selectedTaskIds.add(t.id);
      render();
      return;
    }
    openTaskModal(t.id);
  };
  return row;
}

// タスクとサブタスクを再帰的に描画（一覧共通）
function appendTaskTree(container, t, depth = 0, opts = {}) {
  container.appendChild(taskRowEl(t, { ...opts, tree: true }));
  appendTaskKids(container, t, depth, opts);
}
function appendTaskKids(container, t, depth = 0, opts = {}) {
  if (t.collapsed) return;
  const kids = state.tasks
    .filter(x => x.parentTaskId === t.id && !x.deletedAt)
    .sort((a, b) => a.sortOrder - b.sortOrder);
  if (kids.length && depth < 5) {
    const sub = document.createElement("div");
    sub.className = "subtasks";
    for (const k of kids) appendTaskTree(sub, k, depth + 1, opts);
    container.appendChild(sub);
  }
}
// 完了タスクの下部セクション（TickTick風）: 開閉状態はビューごと・セッション内
const doneOpen = {};
function renderDoneSection(body, doneTasks, key, opts = {}) {
  if (!doneTasks.length) return;
  const open = !!doneOpen[key];
  const head = document.createElement("div");
  head.className = "sec-head" + (open ? "" : " collapsed");
  head.setAttribute("data-testid", "done-head");
  head.innerHTML = `<span class="tri">▼</span> 完了
    <span style="font-size:11px;background:var(--bg3);border-radius:10px;padding:1px 8px;color:var(--text-dim)">${doneTasks.length}</span>`;
  head.onclick = () => { doneOpen[key] = !open; render(); };
  body.appendChild(head);
  if (open) for (const t of doneTasks) appendTaskTree(body, t, 0, opts);
}

// 祖先が同じ集合に含まれるタスクを除外（親の下にツリー表示されるため重複を防ぐ）
function excludeNested(tasks) {
  const inSet = new Set(tasks.map(t => t.id));
  return tasks.filter(t => {
    let p = t.parentTaskId;
    while (p) {
      if (inSet.has(p)) return false;
      p = getTask(p)?.parentTaskId;
    }
    return true;
  });
}

/* ---- プロジェクトビュー ---- */
function renderProjectView(body, actions, title) {
  const p = getProject(view.id);
  if (!p) { setView({ type: "today" }); return; }
  title.innerHTML = `<span class="proj-dot" style="background:${p.color};display:inline-block;margin-right:6px"></span>${esc(p.name)}`;

  actions.innerHTML = `
    <div class="btn-group">
      <button class="btn on" data-testid="view-list-btn">リスト</button>
      <button class="btn" data-testid="view-gantt-btn">ガント</button>
    </div>
    <button class="btn small" data-testid="add-section-btn" style="margin-left:8px">＋セクション</button>
    <button class="btn small" data-testid="edit-project-btn" style="margin-left:4px">✎</button>`;
  actions.querySelector("[data-testid=view-gantt-btn]").onclick = () => setView({ type: "gantt", id: p.id });
  actions.querySelector("[data-testid=add-section-btn]").onclick = () => {
    openPrompt("セクション名", "", name => {
      if (!name) return;
      state.sections.push({ id: uid(), projectId: p.id, name, collapsed: false, sortOrder: state.sections.length });
      commit();
    });
  };
  actions.querySelector("[data-testid=edit-project-btn]").onclick = () => openProjectModal(p.id);

  const tasks = liveTasks().filter(t => t.projectId === p.id && !t.parentTaskId).sort((a, b) => a.sortOrder - b.sortOrder);
  // 完了したトップレベルタスクは下部の「完了」セクションへ（TickTick風）
  const visible = tasks.filter(t => t.status !== "completed");
  const doneTasks = tasks.filter(t => t.status === "completed");

  const secs = state.sections.filter(s => s.projectId === p.id).sort((a, b) => a.sortOrder - b.sortOrder);
  const noSec = visible.filter(t => !t.sectionId || !secs.find(s => s.id === t.sectionId));
  for (const t of noSec) appendTaskTree(body, t, 0, { dnd: true });

  for (const s of secs) {
    const head = document.createElement("div");
    head.className = "sec-head" + (s.collapsed ? " collapsed" : "");
    head.innerHTML = `<span class="tri">▼</span> ${esc(s.name)}`;
    head.onclick = () => { s.collapsed = !s.collapsed; commit(); };
    body.appendChild(head);
    if (!s.collapsed) {
      const inSec = visible.filter(t => t.sectionId === s.id);
      for (const t of inSec) appendTaskTree(body, t, 0, { dnd: true });
      if (!inSec.length) {
        const e = document.createElement("div");
        e.style.cssText = "color:var(--text-faint);font-size:12px;padding:2px 10px";
        e.textContent = "（空）";
        body.appendChild(e);
      }
    }
  }
  if (!visible.length && !secs.length && !doneTasks.length) {
    body.insertAdjacentHTML("beforeend", `<div class="empty-msg">タスクがありません。上の欄から追加してください。</div>`);
  }
  renderDoneSection(body, doneTasks, "project:" + p.id);
}

/* ---- スマートリスト ---- */
function renderSmart(body, actions, title) {
  const today = todayStr();
  const defs = {
    today:   { label: "📅 Today", filter: t => hasTodayReason(t) },
    week:    { label: "🗓 今週", filter: t => {
      const end = addDays(today, 7 - parseDate(today).getDay() - (state.settings.weekStart === 1 ? -1 : 0) % 7);
      const wEnd = addDays(today, 6);
      return (t.dueDate && t.dueDate <= wEnd) || (t.startDate && t.startDate <= wEnd && (!t.endDate || t.endDate >= today));
    } },
    inbox:   { label: "📥 Inbox", filter: t => !t.projectId && !t.parentTaskId },
    overdue: { label: "⚠️ 期限超過", filter: t => t.dueDate && t.dueDate < today },
    all:     { label: "📋 すべてのタスク", filter: () => true },
  };
  const def = defs[view.smart] || defs.all;
  title.textContent = def.label;

  let tasks = activeTasks().filter(def.filter);
  let doneTasks = [];
  if (view.smart === "all") {
    const all = excludeNested(liveTasks());
    tasks = all.filter(t => t.status !== "completed");
    doneTasks = all.filter(t => t.status === "completed");
  } else {
    tasks = excludeNested(tasks); // 親が同じ一覧にいる場合は親の下にツリー表示
  }
  // 新しく追加したタスクが一覧の先頭に来るよう、sortOrder昇順（新しいものほど小さい値）で並べる
  tasks.sort((a, b) => a.sortOrder - b.sortOrder);
  const isG = ganttToggle(actions, "smart:" + (view.smart || "all"));
  if (isG) {
    drawGantt(body, ganttRowsFor(tasks.concat(doneTasks)));
    return;
  }
  if (!tasks.length && !doneTasks.length) {
    body.insertAdjacentHTML("beforeend", `<div class="empty-msg">タスクがありません 🎉</div>`);
    return;
  }
  for (const t of tasks) appendTaskTree(body, t, 0, { showProject: true, dnd: true });
  renderDoneSection(body, doneTasks, "smart:" + (view.smart || "all"), { showProject: true });
}

/* ---- ゴミ箱 ---- */
function renderTrash(body) {
  const trashed = state.tasks.filter(t => t.deletedAt);
  if (!trashed.length) {
    body.innerHTML = `<div class="empty-msg">ゴミ箱は空です</div>`;
    return;
  }
  for (const t of trashed) {
    const row = document.createElement("div");
    row.className = "task-row";
    row.innerHTML = `<div class="t-main"><div class="t-title" style="color:var(--text-dim)">${esc(t.title)}</div>
      <div class="t-badges"><span class="badge">削除: ${t.deletedAt.slice(0, 10)}</span></div></div>
      <button class="btn small" data-testid="restore-btn">復元</button>`;
    row.querySelector("button").onclick = e => { e.stopPropagation(); restoreTask(t.id); toast("復元しました"); };
    body.appendChild(row);
  }
}

/* ---- 検索 ---- */
function renderSearch(body) {
  const q = (view.q || "").toLowerCase();
  if (!q) { body.innerHTML = `<div class="empty-msg">検索語を入力してください</div>`; return; }
  const tasks = liveTasks().filter(t =>
    t.title.toLowerCase().includes(q) || (t.note || "").toLowerCase().includes(q) ||
    (t.tags || []).some(tag => tag.toLowerCase().includes(q)));
  const memos = state.memos.filter(m => !m.deletedAt && (m.title.toLowerCase().includes(q) || (m.body || "").toLowerCase().includes(q)));
  const projs = visibleProjects().filter(p => p.name.toLowerCase().includes(q));

  if (projs.length) {
    body.insertAdjacentHTML("beforeend", `<div class="sec-head">プロジェクト</div>`);
    for (const p of projs) {
      const el = document.createElement("div");
      el.className = "task-row";
      el.innerHTML = `<span class="proj-dot" style="background:${p.color};margin-top:5px"></span><div class="t-main">${esc(p.name)}</div>`;
      el.onclick = () => setView({ type: "project", id: p.id });
      body.appendChild(el);
    }
  }
  body.insertAdjacentHTML("beforeend", `<div class="sec-head">タスク（${tasks.length}）</div>`);
  for (const t of tasks) body.appendChild(taskRowEl(t, { showProject: true }));
  if (memos.length) {
    body.insertAdjacentHTML("beforeend", `<div class="sec-head">メモ（${memos.length}）</div>`);
    for (const m of memos) {
      const el = document.createElement("div");
      el.className = "task-row";
      el.innerHTML = `<div class="t-main"><div class="t-title">📝 ${esc(m.title)}</div></div>`;
      el.onclick = () => { editingMemoId = m.id; setView({ type: "memos" }); };
      body.appendChild(el);
    }
  }
  if (!tasks.length && !memos.length && !projs.length) {
    body.innerHTML = `<div class="empty-msg">「${esc(view.q)}」に一致する項目はありません</div>`;
  }
}
/*========================================================
  MODALS: タスク詳細・プロジェクト・汎用プロンプト
========================================================*/
function closeModal() {
  document.getElementById("modal-root").innerHTML = "";
}
function modalShell(html) {
  const root = document.getElementById("modal-root");
  root.innerHTML = `<div class="modal-bg" data-testid="modal-bg"><div class="modal" data-testid="modal">${html}</div></div>`;
  root.querySelector(".modal-bg").addEventListener("mousedown", e => {
    if (e.target === e.currentTarget) closeModal();
  });
  return root.querySelector(".modal");
}

function openPrompt(label, defVal, cb) {
  const m = modalShell(`
    <h2>${esc(label)}</h2>
    <input id="prompt-input" data-testid="prompt-input" value="${esc(defVal)}" style="width:100%">
    <div class="modal-foot">
      <span class="spacer"></span>
      <button class="btn" data-testid="prompt-cancel">キャンセル</button>
      <button class="btn primary" data-testid="prompt-ok">OK</button>
    </div>`);
  const input = m.querySelector("#prompt-input");
  input.focus(); input.select();
  const ok = () => { const v = input.value.trim(); closeModal(); cb(v); };
  m.querySelector("[data-testid=prompt-ok]").onclick = ok;
  m.querySelector("[data-testid=prompt-cancel]").onclick = closeModal;
  input.onkeydown = e => { if (e.key === "Enter" && !isIMEEnter(e)) ok(); if (e.key === "Escape") closeModal(); };
}

}
function closeDetail() {
  detailTaskId = null;
  renderDetailPanel();
}

    <div class="f-row"><div class="f-col">

      <input type="file" id="tm-att-file" data-testid="tm-att-file" multiple style="display:none">
      <button class="btn small" data-testid="tm-att-btn" style="align-self:flex-start">📎 ファイルを添付</button>
    </div></div>
    <div class="f-row"><div class="f-col">
      <label>サブタスク（${kids.filter(k => k.status === "completed").length}/${kids.length}）※さらに階層化は子を開いて追加</label>
      <div id="tm-subtasks">${(function subTree(pid, depth) {
        return state.tasks.filter(x => x.parentTaskId === pid && !x.deletedAt)
          .sort((a, b) => a.sortOrder - b.sortOrder)
          .map(k => `
        <div class="subtask-line" data-sub="${k.id}" style="margin-left:${depth * 16}px">
          <button class="task-check p-${k.priority} ${k.status === "completed" ? "checked" : ""}" data-testid="sub-check" style="width:15px;height:15px;min-width:15px;font-size:9px">✓</button>
          <span class="st-title ${k.status === "completed" ? "done" : ""}" data-testid="sub-title">${esc(k.title)}</span>
        </div>` + (depth < 4 ? subTree(k.id, depth + 1) : "")).join("");
      })(t.id, 0)}</div>

    </div></div>
    <div class="dp-foot">
      <span class="dp-proj">${t.projectId && getProject(t.projectId)
        ? `<span class="proj-dot" style="background:${getProject(t.projectId).color};display:inline-block;margin-right:5px"></span>${esc(getProject(t.projectId).name)}`

  const $ = sel => panel.querySelector(sel);

  $("[data-testid=tm-close]").onclick = closeDetail;
  // 縦にスワイプして閉じる（ヘッダー部分をつかんでドラッグ。本文は縦スクロールするため対象外）
  {
    const head = panel.querySelector(".dp-head");

    head.addEventListener("touchstart", e => { touchStartY = e.touches[0].clientY; }, { passive: true });
    head.addEventListener("touchend", e => {
      if (touchStartY === null) return;
      const dy = e.changedTouches[0].clientY - touchStartY;
      touchStartY = null;
      if (Math.abs(dy) > 60) closeDetail();
    }, { passive: true });
  }
  $("[data-testid=tm-check]").onclick = () => toggleComplete(t.id);
  $("[data-testid=tm-delegate]").onclick = () => toggleDelegated(t.id);
  $("[data-testid=tm-complete]").onclick = () => toggleComplete(t.id);
  $("[data-testid=tm-delete]").onclick = () => {
    if (!confirm(`「${t.title}」を削除しますか？（30日間はゴミ箱から復元可）`)) return;

    deleteTask(t.id);
    toast("ゴミ箱に移動しました");

  panel.querySelectorAll(".dp-flags .flag-btn").forEach(b => {
    b.onclick = () => apply(() => { t.priority = b.dataset.p; });

  // 親タスクへのパンくず・変更/解除・検索して設定
  const crumb = $("[data-testid=dp-parent]");
  if (crumb) crumb.onclick = () => openTaskModal(t.parentTaskId);
  const parentEditBtn = $("[data-testid=tm-parent-edit]");

  const parentClearBtn = $("[data-testid=tm-parent-clear]");

      const q = parentSearchEl.value.trim().toLowerCase();
      const matches = (q ? parentCandidates.filter(x => x.title.toLowerCase().includes(q) || shortId(x.id).includes(q)) : parentCandidates).slice(0, 30);

        ? matches.map(x => `<div class="dep-search-item" data-id="${x.id}"><span>${esc(x.title)}${x.projectId ? `<span class="dep-search-proj"> ・ ${esc(getProject(x.projectId)?.name || "")}</span>` : ""}</span><span class="task-id-badge">#${shortId(x.id)}</span></div>`).join("")

    parentSearchEl.addEventListener("focus", renderParentOptions);
    parentSearchEl.addEventListener("input", renderParentOptions);
    parentSearchEl.addEventListener("blur", () => setTimeout(() => { editingParent = false; renderDetailPanel(); }, 150));
  }

  // タイトル・メモ: 入力中はフォーカスを保つため、メイン画面のみ更新（パネルは触らない）
  let typeTimer = null;
  const liveSave = () => { touch(t); save(); renderMain(); };
  $("#tm-title").addEventListener("input", e => {
    const v = e.target.value.trim();
    if (!v) return; // 空タイトルは保存しない
    t.title = v;
    clearTimeout(typeTimer); typeTimer = setTimeout(liveSave, 400);
  });

  // メモ欄（編集モード）: 高さは画面の1/3を初期値に、内容に応じて自動拡張
  const noteTa = $("#tm-note");
  if (noteTa) {
    const grow = () => {
      noteTa.style.height = "auto";
      noteTa.style.height = Math.max(Math.round(window.innerHeight / 3), noteTa.scrollHeight + 4) + "px";
    };
    grow();
    noteTa.addEventListener("input", () => {
      grow();
      t.note = noteTa.value;
      clearTimeout(typeTimer); typeTimer = setTimeout(liveSave, 400);
    });
    noteTa.addEventListener("blur", () => {
      t.note = noteTa.value; touch(t); save(); renderMain();
      // 内容があれば表示モード（チェックリスト操作可能）へ。クリック先の操作を妨げないよう少し遅らせる
      setTimeout(() => {
        if (detailTaskId === t.id && document.activeElement !== noteTa && (t.note || "").trim()) {

          renderDetailPanel();

        lines[i] = cb.checked

          : lines[i].replace(/\[[xX]\]/, "[ ]").replace(/\([xX]\)/, "()");
        apply(() => { t.note = lines.join("\n"); });
      };
    });
    noteView.addEventListener("click", e => {
      if (e.target.closest("input") || e.target.closest("a")) return;
      noteEditing = true;
      renderDetailPanel();
