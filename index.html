/*========================================================
  TickTick CSVインポート
========================================================*/
// 汎用CSVパーサ（引用符内の改行・カンマ・二重引用符に対応）
function parseCSV(text) {
  const rows = [];
  let row = [], field = "", inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') { if (text[i + 1] === '"') { field += '"'; i++; } else inQuotes = false; }
      else field += c;
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ",") { row.push(field); field = ""; }
      else if (c === "\n") { row.push(field); field = ""; rows.push(row); row = []; }
      else if (c === "\r") { /* 無視 */ }
      else field += c;
    }
  }
  if (field || row.length) { row.push(field); rows.push(row); }
  return rows;
}

// TickTickのCSVをパースして必要な列だけの配列にする（先頭の "Date:"/"Version:" 等の前置行はヘッダー行を探して読み飛ばす）
function parseTickTickCSV(text) {
  const rows = parseCSV(text);
  const hi = rows.findIndex(r => r.includes("Title") && r.includes("taskId") && r.includes("parentId"));
  if (hi < 0) return null;
  const cols = rows[hi];
  const idx = {};
  cols.forEach((c, i) => { idx[c] = i; });
  if (["Title", "Kind", "List Name", "taskId"].some(k => idx[k] === undefined)) return null;
  const out = [];
  for (let i = hi + 1; i < rows.length; i++) {
    const r = rows[i];
    if (r.length !== cols.length) continue; // 壊れた行はスキップ
    const g = name => (idx[name] !== undefined ? r[idx[name]] : "") ?? "";
    out.push({
      folder: g("Folder Name"), list: g("List Name"), title: g("Title"), kind: g("Kind"),
      tags: g("Tags"), content: g("Content"), isChecklist: g("Is Check list") === "Y",
      startDate: g("Start Date"), dueDate: g("Due Date"), repeat: g("Repeat"),
      priority: g("Priority"), status: g("Status"), createdTime: g("Created Time"),
      completedTime: g("Completed Time"), timezone: g("Timezone") || "Asia/Tokyo",
      allDay: g("Is All Day"),
      columnName: g("Column Name"), taskId: g("taskId"), parentId: g("parentId"),
    });
  }
  return out;
}

// ISO日時（例: 2026-07-04T15:00:00+0000）を指定タイムゾーンの 'YYYY-MM-DD' に変換
function ttDateOnly(iso, tz) {
  if (!iso) return null;
  const d = new Date(iso);
  if (isNaN(d.getTime())) return null;
  try {
    return new Intl.DateTimeFormat("sv-SE", { timeZone: tz || "Asia/Tokyo" }).format(d);
  } catch {
    return new Intl.DateTimeFormat("sv-SE", { timeZone: "Asia/Tokyo" }).format(d);
  }
}

// ISO日時を指定タイムゾーンの 'HH:MM' に変換（終日でないタスクの時刻取り込み用）
function ttTimeOnly(iso, tz) {
  if (!iso) return null;
  const d = new Date(iso);
  if (isNaN(d.getTime())) return null;
  try {
    return new Intl.DateTimeFormat("ja-JP", { timeZone: tz || "Asia/Tokyo", hour: "2-digit", minute: "2-digit", hourCycle: "h23" }).format(d);
  } catch {
    return null;
  }
}

const TT_PRIORITY = { "0": "none", "1": "low", "3": "medium", "5": "high" };

// Status: 0=通常 1=完了 2=アーカイブ（完了日時があれば完了扱い、なければ「見送り」扱い）
function ttStatusFields(row) {
  const completedAt = row.completedTime ? new Date(row.completedTime).toISOString() : null;
  if (row.status === "1") return { status: "completed", completedAt: completedAt || nowISO() };
  if (row.status === "2") return completedAt ? { status: "completed", completedAt } : { status: "abandoned", completedAt: null };
  if (row.status === "0") return { status: "active", completedAt: null };
  return { status: "abandoned", completedAt: null };
}

// TickTickのRepeatルール（RRULE風文字列）を内部の繰り返しモデルへ変換。未知の形式はnull（繰り返しなしで取り込み）
function parseRRuleToRepeat(str) {
  if (!str || !/^FREQ=/.test(str)) return null;
  const parts = Object.fromEntries(str.split(";").map(kv => kv.split("=")));
  const freqMap = { DAILY: "day", WEEKLY: "week", MONTHLY: "month", YEARLY: "year" };
  const unit = freqMap[parts.FREQ];
  if (!unit) return null;
  const interval = Math.max(1, parseInt(parts.INTERVAL, 10) || 1);
  const rep = { unit, interval, from: "due" };
  if (unit === "week" && parts.BYDAY) {
    const map = { SU: 0, MO: 1, TU: 2, WE: 3, TH: 4, FR: 5, SA: 6 };
    const byDay = parts.BYDAY.split(",").map(d => map[d]).filter(d => d !== undefined).sort((a, b) => a - b);
    if (byDay.length) rep.byDay = byDay;
  }
  return rep;
}

// 改行コードを統一し、チェックリスト形式（▫項目・◆見出し）ならMarkdownに変換
function ttNormalizeText(s) {
  return (s || "").replace(/\r\n/g, "\n").replace(/\r/g, "\n");
}
function ttChecklistToNote(text) {
  return text.split("\n").map(line => {
    line = line.trim();
    if (!line) return "";
    if (line.startsWith("◆")) return "### " + line.slice(1).trim();
    if (line.startsWith("▫")) return "- [ ] " + line.slice(1).trim();
    return line;
  }).join("\n");
}
function ttCapNote(note, cap) {
  if (!cap || note.length <= cap) return note;
  return note.slice(0, cap) + `\n…（${note.length - cap}文字省略。全文は元のCSVファイルに残っています）`;
}

// メモ本文の合計サイズを概算（インポート前の容量見積り用。1件あたりのJSONオーバーヘッドは実測ベースで約500文字）
function estimateNoteBytes(rows, cap) {
  let total = 0;
  for (const r of rows) total += Math.min(ttNormalizeText(r.content).length, cap || Infinity) + r.title.length + 500;
  return total;
}

// インポート本体: 新しいプロジェクト/セクション/タスクを作成（既存データは変更しない）
function importTickTickRows(rows, opts) {
  const cap = opts && opts.noteCap;
  const existingBySource = new Map();
  for (const t of state.tasks) if (t.source === "ticktick" && t.sourceId) existingBySource.set(t.sourceId, t);

  const projByName = new Map(visibleProjects().map(p => [p.name, p]));
  const getOrMakeProject = name => {
    const key = name || "TickTickインポート";
    if (projByName.has(key)) return projByName.get(key);
    const p = {
      id: uid(), name: key, color: PROJ_COLORS[state.projects.length % PROJ_COLORS.length],
      icon: "", status: "active", sortOrder: state.projects.length, showCompleted: true,
      createdAt: nowISO(), updatedAt: nowISO(),
    };
    state.projects.push(p);
    projByName.set(key, p);
    return p;
  };
  const secByKey = new Map(state.sections.map(s => [s.projectId + "|" + s.name, s]));
  const getOrMakeSection = (projectId, name) => {
    if (!name || name === "セクション化されていません") return null;
    const key = projectId + "|" + name;
    if (secByKey.has(key)) return secByKey.get(key);
    const s = { id: uid(), projectId, name, collapsed: false, sortOrder: state.sections.filter(x => x.projectId === projectId).length };
    state.sections.push(s);
    secByKey.set(key, s);
    return s;
  };

  // TickTickのtaskId -> 新しいid。過去のインポート分もすべて登録しておくことで、
  // 範囲を絞った追加インポートでも「前回取り込んだ親」に子を正しくぶら下げられる
  const idMap = new Map();
  for (const [sid, ex] of existingBySource) idMap.set(sid, ex.id);
  const toCreate = [];
  let skipped = 0;
  for (const r of rows) {
    if (existingBySource.has(r.taskId)) { skipped++; continue; }
    const proj = getOrMakeProject(r.list);
    const sec = getOrMakeSection(proj.id, r.columnName);
    const sf = ttStatusFields(r);
    const rawNote = r.isChecklist ? ttChecklistToNote(ttNormalizeText(r.content)) : ttNormalizeText(r.content);
    const rawStart = ttDateOnly(r.startDate, r.timezone);
    const rawDue = ttDateOnly(r.dueDate, r.timezone);
    let startDate = null, endDate = null, dueDate = rawDue;
    if (rawStart && rawDue && rawStart < rawDue) { startDate = rawStart; endDate = rawDue; }
    else if (rawStart && !rawDue) { dueDate = rawStart; }
    const endTime = endDate && r.allDay === "false" ? ttTimeOnly(r.dueDate || r.startDate, r.timezone) : null;
    const t = {
      id: uid(), title: r.title || "(無題)", note: ttCapNote(rawNote, cap),
      status: sf.status, progress: sf.status === "completed" ? 100 : 0,
      projectId: proj.id, sectionId: sec ? sec.id : null, parentTaskId: null,
      priority: TT_PRIORITY[r.priority] || "none",
      tags: r.tags ? r.tags.split(",").map(s => s.trim()).filter(Boolean) : [],
      assignee: "", category: "",
      startDate, endDate, endTime, dueDate, earliestStartDate: null,
      blockedBy: [], isMilestone: false, nextAction: null, gcalEventId: null,
      attachments: [], collapsed: false,
      repeat: parseRRuleToRepeat(r.repeat),
      sortOrder: state.tasks.length + toCreate.length,
      createdAt: r.createdTime && !isNaN(new Date(r.createdTime)) ? new Date(r.createdTime).toISOString() : nowISO(),
      updatedAt: nowISO(), completedAt: sf.completedAt, deletedAt: null,
      source: "ticktick", sourceId: r.taskId, ttParentId: r.parentId || null,
    };
    idMap.set(r.taskId, t.id);
    toCreate.push(t);
  }
  // 親子関係を解決してからまとめて追加
  for (const t of toCreate) {
    if (t.ttParentId && idMap.has(t.ttParentId)) t.parentTaskId = idMap.get(t.ttParentId);
    delete t.ttParentId;
  }
  state.tasks.push(...toCreate);
  for (const t of toCreate) maybeQueueCalendarSync(t);
  fixSubtaskProjects(state.tasks); // 親子でプロジェクトがずれていれば補正
  return { created: toCreate.length, skipped, projects: new Set(toCreate.map(x => x.projectId)).size };
}

function openTickTickImportModal(rows) {
  const mb = n => (n / 1024 / 1024).toFixed(1);
  const listCount = new Set(rows.map(r => r.list)).size;
  // 取り込む範囲: ブラウザの保存容量（約5MB）に収まるよう、未完了だけに絞れるようにする
  const cutoff = addDays(todayStr(), -30);
  const isActiveRow = r => ttStatusFields(r).status === "active";
  const isRecentRow = r => {
    const sf = ttStatusFields(r);
    return sf.status === "active" || (sf.status === "completed" && sf.completedAt && sf.completedAt.slice(0, 10) >= cutoff);
  };
  const scopes = {
    active: rows.filter(isActiveRow),
    recent: rows.filter(isRecentRow),
    all: rows,
  };
  const m = modalShell(`
    <h2>📥 TickTickインポート</h2>
    <p style="font-size:13px;color:var(--text-dim);line-height:1.7">
      ${rows.length.toLocaleString()}件のタスク・${listCount}個のリストが見つかりました。既存のデータは変更されず、新しいプロジェクトとして追加されます（再インポートしても重複しません）。
    </p>
    <div class="f-col" style="margin-bottom:12px;gap:6px">
      <label>取り込む範囲</label>
      <label style="font-size:13px;display:flex;gap:6px;align-items:center"><input type="radio" name="tt-scope" value="active" checked data-testid="tt-scope-active"> 未完了のみ（${scopes.active.length.toLocaleString()}件・推奨）</label>
      <label style="font-size:13px;display:flex;gap:6px;align-items:center"><input type="radio" name="tt-scope" value="recent" data-testid="tt-scope-recent"> 未完了＋30日以内に完了（${scopes.recent.length.toLocaleString()}件）</label>
      <label style="font-size:13px;display:flex;gap:6px;align-items:center"><input type="radio" name="tt-scope" value="all" data-testid="tt-scope-all"> すべて（${rows.length.toLocaleString()}件・完了済みの履歴も含む）</label>
    </div>
    <div class="f-col" style="margin-bottom:12px;gap:6px">
      <label>メモの扱い</label>
      <label style="font-size:13px;display:flex;gap:6px;align-items:center"><input type="radio" name="tt-note" value="300" checked data-testid="tt-note-cap"> 300字に要約（推奨）</label>
      <label style="font-size:13px;display:flex;gap:6px;align-items:center"><input type="radio" name="tt-note" value="" data-testid="tt-note-full"> 全文を保持</label>
    </div>
    <p style="font-size:12px" data-testid="tt-size-estimate"></p>
    <div class="modal-foot">
      <button class="btn" data-testid="tt-cancel">キャンセル</button>
      <span class="spacer"></span>
      <button class="btn primary" data-testid="tt-run">この条件でインポート</button>
    </div>`);
  const getScope = () => m.querySelector("input[name=tt-scope]:checked").value;
  const getCap = () => m.querySelector("input[name=tt-note]:checked").value ? 300 : null;
  const estEl = m.querySelector("[data-testid=tt-size-estimate]");
  const updateEst = () => {
    const bytes = estimateNoteBytes(scopes[getScope()], getCap());
    const tooBig = bytes > 4 * 1024 * 1024; // 4MB超は失敗の可能性が高い
    estEl.style.color = tooBig ? "var(--danger)" : "var(--text-dim)";
    estEl.textContent = `推定サイズ: 約 ${mb(bytes)}MB` +
      (tooBig ? "（⚠ ブラウザの保存上限を超える可能性が高いです。範囲を絞るか要約を選んでください）" : "（保存可能な範囲です）");
  };
  m.querySelectorAll("input[name=tt-scope], input[name=tt-note]").forEach(r => { r.onchange = updateEst; });
  updateEst();
  m.querySelector("[data-testid=tt-cancel]").onclick = closeModal;
  m.querySelector("[data-testid=tt-run]").onclick = () => {
    const chosen = scopes[getScope()];
    const cap = getCap();
    closeModal();
    toast("インポート中...お待ちください");
    setTimeout(() => {
      const before = JSON.stringify(state);
      const result = importTickTickRows(chosen, { noteCap: cap });
      const ok = saveOrRevert(before);
      render();
      if (ok) {
        toast(`✅ ${result.created}件のタスクを${result.projects}個のプロジェクトにインポートしました` +
          (result.skipped ? `（${result.skipped}件は再インポートのためスキップ）` : ""));
      }
    }, 30);
  };
}

/* ---- GAS同期: pull → マージ → push ---- */
// resetAt指定時: 「ローカルにしかない項目」はリセット後に作られたものだけ復活を許可する。
// （リセットより古い更新日時＝リセット前の残骸とみなして捨てる。他端末が既に持っている
//   項目＝remoteArrにある項目は従来通り無条件にマージするので、新規端末が正当な最新データを
//   受け取れなくなることはない）
function mergeById(localArr, remoteArr, resetAt) {
  const map = new Map();
  for (const e of remoteArr || []) map.set(e.id, e);
  for (const e of localArr || []) {
    const r = map.get(e.id);
    if (r) {
      if ((e.updatedAt || "") >= (r.updatedAt || "")) map.set(e.id, e); // 新しい方が勝ち
    } else if (!resetAt || (e.updatedAt || "") >= resetAt) {
      map.set(e.id, e);
    }
  }
  return [...map.values()];
}
let syncInFlight = false;
let autoSyncTimer = null;

// 同期先へ現在のstateを一方的に書き込む（pull/mergeなし）。全データリセット専用。
// 通常のsyncNow()はpull→mergeするため、リセット後にこれを使わず放置すると
// 同期先に残った旧データが自動同期でpullされ、消したはずのタスクが復活してしまう。
async function pushStateToGas() {
  const { gasUrl, gasKey } = state.settings;
  if (!gasUrl) return { ok: false, error: "not configured" };
  try {
    const { files } = await collectAttachmentFilesForSync();
    const res = await fetch(gasUrl, {
      method: "POST", headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ key: gasKey, action: "push", data: {
        projects: state.projects, sections: state.sections, tasks: state.tasks, memos: state.memos,
        files, resetAt: state.resetAt, today: state.today,
      } }),
    });
    const json = await res.json();
    if (json.error) throw new Error(json.error);
    return { ok: true };
  } catch (e) {
    return { ok: false, error: e.message };
  }
}

// 変更後しばらくしてから自動同期（連続編集中に何度も送らないよう15秒デバウンス）
function queueSync() {
  if (!state || !state.settings.gasUrl || syncInFlight) return;
  clearTimeout(autoSyncTimer);
  autoSyncTimer = setTimeout(() => syncNow(null, { quiet: true }), 15000);
}

async function syncNow(statusEl, opts = {}) {
  const quiet = !!opts.quiet;
  const { gasUrl, gasKey } = state.settings;
  if (!gasUrl) { if (!quiet) toast("GAS WebアプリURLを設定してください", "warn"); return; }
  if (syncInFlight) return;
  syncInFlight = true;
  clearTimeout(autoSyncTimer);
  // 表示要素は書き込みのたびに取得する（途中でrender()が走ると要素が作り直されるため）
  const setStatus = s => {
    const el = document.getElementById("sync-status");
    if (el) el.textContent = s;
  };
  setStatus("同期中...");
  try {
    // text/plain でPOSTするとCORSプリフライトを回避できる（GASの制約対応）
    const pullRes = await fetch(gasUrl, {
      method: "POST", headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ key: gasKey, action: "pull" }),
    });
    const pull = await pullRes.json();
    if (pull.error) throw new Error(pull.error);
    if (pull.data) {
      const r = pull.data;
      // 自分・相手のどちらか新しい方の「全データリセット」時刻を採用する。
      // mergeByIdはこれより古い更新日時の「ローカルにしかない項目」を復活させない
      // （updatedAtだけのマージだと、リセット後に古いデータを持つ端末が
      //   同期先へ復元してしまう＝リセットしても数秒で復活するバグの原因だった。
      //   一方、相手が既に持っている項目は無条件にマージするので、
      //   まっさらな新端末が最新データを受け取れなくなることはない）
      const effectiveResetAt = (r.resetAt && (!state.resetAt || r.resetAt > state.resetAt)) ? r.resetAt : state.resetAt;
      state.projects = mergeById(state.projects, r.projects, effectiveResetAt);
      state.sections = mergeById(state.sections, r.sections, effectiveResetAt);
      state.tasks = mergeById(state.tasks, r.tasks, effectiveResetAt);
      state.memos = mergeById(state.memos, r.memos, effectiveResetAt);
      state.resetAt = effectiveResetAt;
      // 「今日すること」の並び順も同期する。配列のmergeByIdとは違い単一オブジェクトなので、
      // 「同じ日付（date）」かつ「相手が実際にカスタマイズ済み」の場合だけ、
      // こちら未カスタマイズなら無条件に、両方カスタマイズ済みならupdatedAtが新しい方を採用する。
      // （日付が変わった直後はローカルのupdatedAtが単なるリセットで新しくなるだけなので、
      //   updatedAtだけの単純比較だと相手の実際の並び替えを誤って捨ててしまう）
      if (r.today && r.today.date === state.today.date) {
        const localCustomized = state.today.manualOrder !== null || (state.today.manualAdded || []).length > 0;
        const remoteCustomized = r.today.manualOrder !== null || (r.today.manualAdded || []).length > 0;
        if (remoteCustomized && (!localCustomized || (r.today.updatedAt || "") > (state.today.updatedAt || ""))) {
          state.today = r.today;
        }
      }
      await applyIncomingFiles(r.files); // 相手が持つ添付の実体でローカルにまだないものを取り込む
    }
    const { files, skipped } = await collectAttachmentFilesForSync();
    if (skipped && !quiet) toast(`⚠ 添付ファイルが大きすぎるため${skipped}件は今回同期されませんでした`, "warn");
    const pushRes = await fetch(gasUrl, {
      method: "POST", headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ key: gasKey, action: "push", data: {
        projects: state.projects, sections: state.sections, tasks: state.tasks, memos: state.memos,
        files, resetAt: state.resetAt, today: state.today,
      } }),
    });
    const push = await pushRes.json();
    if (push.error) throw new Error(push.error);
    save();
    // 入力中に画面を作り直すとフォーカスが失われるため、編集中は再描画を控える
    const typing = document.activeElement && ["INPUT", "TEXTAREA", "SELECT"].includes(document.activeElement.tagName);
    if (!typing) render(); else renderSidebar();
    setStatus("✔ 同期完了 " + new Date().toLocaleTimeString());
    if (!quiet) toast("同期が完了しました");
  } catch (e) {
    setStatus("✖ 失敗");
    if (!quiet) toast("同期失敗: " + e.message, "error");
  } finally {
    syncInFlight = false;
  }
}
/*========================================================
  INIT: イベント・ショートカット・起動
========================================================*/
/* ---- グローバル・クイック追加バー（TickTick風・全画面共通） ---- */
const qa = { priority: "none", project: "__ctx" }; // __ctx = 今の画面のプロジェクトに追加

function qaContext() {
  if ((view.type === "project" || view.type === "gantt") && getProject(view.id)) {
    const p = getProject(view.id);
    return { pid: p.id, name: p.name };
  }
  return { pid: null, name: "受信トレイ" };
}

function updateQuickAddBar() {
  const bar = document.getElementById("global-add");
  const hide = ["memos", "settings", "trash", "search"].includes(view.type);
  bar.style.display = hide ? "none" : "flex";
  if (hide) return;
  const ctx = qaContext();
  const destName = qa.project === "__ctx" ? ctx.name : (qa.project ? (getProject(qa.project)?.name || "受信トレイ") : "受信トレイ");
  document.getElementById("qa-input").placeholder = `＋ タスクを"${destName}"に追加`;
  document.getElementById("qa-today").classList.toggle("on", document.getElementById("qa-due").value === todayStr());
  // 追加先セレクトを最新化
  const sel = document.getElementById("qa-project");
  const cur = qa.project;
  sel.innerHTML = `<option value="__ctx">（今の画面: ${esc(ctx.name)}）</option><option value="">受信トレイ</option>` +
    visibleProjects().sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0)).map(p => `<option value="${p.id}">${esc(p.name)}</option>`).join("");
  sel.value = cur;
  if (sel.value !== cur) { qa.project = "__ctx"; sel.value = "__ctx"; }
  // 優先度フラグの選択表示
  document.querySelectorAll("#qa-popover .flag-btn").forEach(b => b.classList.toggle("sel", b.dataset.p === qa.priority));
}

function qaCreate() {
  const input = document.getElementById("qa-input");
  const title = input.value.trim();
  if (!title) return;
  const ctx = qaContext();
  const pid = qa.project === "__ctx" ? ctx.pid : (qa.project || null);
  let due = document.getElementById("qa-due").value || null;
  // 「今日すること」画面からの追加は、納期未指定なら今日を既定にする。
  // state.today.manualAddedは端末ローカルの一覧で同期対象外のため、日付なしのままだと
  // 他端末では「今日やる理由」が無く表示されない（納期はタスク本体の同期対象フィールド）。
  if (!due && view.type === "today") due = todayStr();
  let start = document.getElementById("qa-start").value || null;
  let end = document.getElementById("qa-end").value || null;
  // 開始日が未入力なら終了日と同じ値を自動設定（詳細パネルの開始日/終了日の挙動と揃える）
  if (end && !start) start = end;
  else if (start && end && end < start) end = start;
  const endTime = document.getElementById("qa-end-time").value || null;
  const tags = document.getElementById("qa-tags").value.split(",").map(s => s.trim()).filter(Boolean);
  const t = newTask({ title, projectId: pid, priority: qa.priority, dueDate: due, startDate: start, endDate: end, endTime: end ? endTime : null, tags });
  // 「今日すること」はスコア順の独自並びのため、新規タスクを一番上に固定するには
  // 手動並び順（manualOrder）の先頭に差し込む（他は今までの並びを維持）
  if (view.type === "today") {
    const currentOrder = state.today.manualOrder || autoSortToday(excludeNested(todayTasks())).map(x => x.id);
    state.today.manualOrder = [t.id, ...currentOrder.filter(id => id !== t.id)];
    state.today.updatedAt = nowISO();
  }
  // 入力と単発オプションをリセット（追加先の選択は維持）
  input.value = "";
  qa.priority = "none";
  for (const id of ["qa-due", "qa-start", "qa-end", "qa-end-time", "qa-tags"]) document.getElementById(id).value = "";
  document.getElementById("qa-popover").classList.remove("open");
  commit();
  toast(`「${t.title}」を追加しました`);
  input.focus();
}

{
  const input = document.getElementById("qa-input");
  input.addEventListener("keydown", e => { if (e.key === "Enter" && !isIMEEnter(e)) { e.preventDefault(); qaCreate(); } });
  document.getElementById("qa-add-btn").onclick = qaCreate;
  document.getElementById("qa-today").onclick = () => {
    const due = document.getElementById("qa-due");
    due.value = due.value === todayStr() ? "" : todayStr();
    updateQuickAddBar();
  };
  document.getElementById("qa-more").onclick = () => document.getElementById("qa-popover").classList.toggle("open");
  document.querySelectorAll("#qa-popover .flag-btn").forEach(b => {
    b.onclick = () => { qa.priority = b.dataset.p; updateQuickAddBar(); };
  });
  document.getElementById("qa-project").onchange = e => { qa.project = e.target.value; updateQuickAddBar(); };
  document.getElementById("qa-due").onchange = updateQuickAddBar;
  // 外側クリックでポップオーバーを閉じる
  document.addEventListener("mousedown", e => {
    const pop = document.getElementById("qa-popover");
    if (pop.classList.contains("open") && !e.target.closest("#global-add")) pop.classList.remove("open");
  });
}

function quickNewTask() {
  // どの画面でも: クイック追加バーにフォーカス（タスク系画面でなければ今日へ移動）
  if (["memos", "settings", "trash", "search"].includes(view.type)) setView({ type: "today" });
  document.getElementById("qa-input").focus();
}

document.getElementById("add-project-btn").onclick = () => openProjectModal(null);
document.getElementById("fab").onclick = quickNewTask;
document.getElementById("menu-btn").onclick = () => {
  if (window.innerWidth <= 760) { // モバイル: ドロワー表示
    document.getElementById("sidebar").classList.add("open");
    document.getElementById("sidebar-bg").classList.add("show");
  } else { // PC: サイドバーの表示/非表示を切替（設定として保存）
    state.settings.sidebarHidden = !state.settings.sidebarHidden;
    document.body.classList.toggle("sidebar-hidden", state.settings.sidebarHidden);
    save();
  }
};
document.getElementById("sidebar-bg").onclick = () => {
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sidebar-bg").classList.remove("show");
};

const searchInput = document.getElementById("search-input");
let searchTimer = null;
searchInput.addEventListener("input", () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    const q = searchInput.value.trim();
    if (q) setView({ type: "search", q });
    else if (view.type === "search") setView({ type: "today" });
  }, 250);
});

document.addEventListener("keydown", e => {
  const tag = document.activeElement?.tagName;
  const typing = tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT";
  const modalOpen = !!document.querySelector(".modal-bg");
  if (e.key === "Escape") { closeModal(); closeDetail(); return; }
  if (typing || modalOpen) return;
  if (e.ctrlKey && e.key === "s") { e.preventDefault(); save(); toast("保存しました（自動保存も有効です）"); return; }
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  switch (e.key) {
    case "n": case "N": e.preventDefault(); quickNewTask(); break;
    case "/": e.preventDefault(); searchInput.focus(); break;
    case "1": setView({ type: "today" }); break;
    case "2": setView({ type: "dashboard" }); break;
    case "3": setView({ type: "gantt", id: "__all" }); break;
    case "4": setView({ type: "memos" }); break;
  }
});

// 画像・ファイルの貼り付け → 右パネルで開いているタスクに添付
document.addEventListener("paste", e => {
  if (!detailTaskId) return;
  const files = [...(e.clipboardData?.files || [])];
  if (!files.length) return;
  const t = getTask(detailTaskId);
  if (!t || t.deletedAt) return;
  e.preventDefault();
  attachFiles(t, files);
});

// 日付が変わったら「今日やる」をリセットして再描画（開きっぱなし対策）
setInterval(() => {
  if (state.today.date !== todayStr()) {
    state.today = { date: todayStr(), manualOrder: null, manualAdded: [], updatedAt: nowISO() };
    commit();
  }
}, 60000);

/* ---- 起動 ---- */
state = loadState();
save();
document.body.classList.toggle("sidebar-hidden", !!state.settings.sidebarHidden);
render();
// 同期設定があれば、起動時と5分ごとに自動同期
if (state.settings.gasUrl) setTimeout(() => syncNow(null, { quiet: true }), 1200);
setInterval(() => { if (state.settings.gasUrl) syncNow(null, { quiet: true }); }, 300000);

// タブ/アプリが前面に戻ってきたときにも同期（5分待たずに他端末の変更を拾うため）
let lastVisibilitySync = 0;
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState !== "visible" || !state.settings.gasUrl) return;
  const now = Date.now();
  if (now - lastVisibilitySync < 5000) return; // 短時間の連続切り替えでの連打を防ぐ
  lastVisibilitySync = now;
  syncNow(null, { quiet: true });
});
